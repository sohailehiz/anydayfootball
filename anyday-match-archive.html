<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anyday Football — Match Archive</title>
<style>
:root{
  --bg:#0b0f14; --panel:#131a22; --panel2:#1a2330; --line:rgba(255,255,255,0.08);
  --text:#eef2f6; --dim:rgba(238,242,246,0.6); --gold:#ffcf4d; --green:#3ddc84;
  --mid:#5b9dff; --week:#ff8a5b; --danger:#ff6a6a; --radius:12px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;color:var(--text);}
.wrap{max-width:1100px;margin:0 auto;padding:24px 18px 60px;}
h1{font-size:clamp(24px,4vw,34px);margin:0 0 4px;letter-spacing:-0.5px;}
.sub{color:var(--dim);font-size:14px;margin-bottom:20px;}
.stat-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px;}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;flex:1;min-width:120px;}
.stat .n{font-size:26px;font-weight:700;}
.stat .l{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;position:sticky;top:0;background:var(--bg);padding:10px 0;z-index:5;}
.tabs{display:flex;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:4px;}
.tab-btn{background:none;border:none;color:var(--dim);padding:8px 16px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;}
.tab-btn.active{background:var(--panel2);color:var(--text);}
.pill-group{display:flex;gap:6px;}
.pill{background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:8px 14px;border-radius:999px;font-size:13px;cursor:pointer;font-weight:600;}
.pill.active{color:var(--bg);background:var(--gold);}
.pill.active[data-grp="all"]{background:var(--text);}
.pill.active[data-grp="m"]{background:var(--mid);}
.pill.active[data-grp="w"]{background:var(--week);}
input#search{flex:1;min-width:160px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:9px 16px;color:var(--text);font-size:13px;}
input#search::placeholder{color:var(--dim);}
.view{display:none;}
.view.active{display:block;}
.match-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px;}
.match-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.match-date{font-size:16px;font-weight:700;}
.match-date .wd{color:var(--dim);font-weight:500;font-size:13px;margin-left:6px;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;letter-spacing:0.3px;text-transform:uppercase;}
.badge.m{background:rgba(91,157,255,0.15);color:var(--mid);}
.badge.w{background:rgba(255,138,91,0.15);color:var(--week);}
.match-meta{font-size:12.5px;color:var(--dim);}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.chip{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:5px 9px;font-size:12.5px;display:flex;align-items:center;gap:5px;cursor:pointer;}
.chip:hover{border-color:var(--gold);}
.chip .tag{font-size:9.5px;font-weight:700;padding:1px 5px;border-radius:5px;text-transform:uppercase;}
.tag.late{background:rgba(255,207,77,0.18);color:var(--gold);}
.tag.ns{background:rgba(255,106,106,0.18);color:var(--danger);}
.tag.g{background:rgba(61,220,132,0.18);color:var(--green);}
.count-pill{font-size:12px;color:var(--dim);}
.empty{text-align:center;color:var(--dim);padding:40px 0;}
table{width:100%;border-collapse:collapse;}
.player-table .row{display:flex;align-items:center;padding:10px 6px;border-bottom:1px solid var(--line);cursor:pointer;}
.player-table .row:hover{background:var(--panel2);}
.player-table .rank{width:32px;color:var(--dim);font-size:12px;}
.player-table .name{flex:1;font-size:14px;font-weight:600;}
.player-table .bar-track{flex:2;background:rgba(255,255,255,0.06);border-radius:6px;height:8px;margin:0 12px;overflow:hidden;}
.player-table .bar-fill{height:100%;background:linear-gradient(90deg,var(--mid),var(--gold));}
.player-table .cnt{width:34px;text-align:right;font-family:monospace;font-size:13px;color:var(--dim);}
.note{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;font-size:12.5px;color:var(--dim);line-height:1.6;margin-top:26px;}
.note b{color:var(--text);}
.player-detail{margin-top:6px;font-size:12.5px;color:var(--dim);}
.back-btn{background:none;border:1px solid var(--line);color:var(--dim);border-radius:999px;padding:6px 14px;font-size:12.5px;cursor:pointer;margin-bottom:14px;}
footer.tag{text-align:center;color:var(--dim);font-size:11.5px;margin-top:40px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:12.5px;color:var(--dim);margin-bottom:6px;font-weight:600;}
.form-input, .form-select, textarea.form-input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--text);font-size:13.5px;font-family:inherit;}
.form-input:focus, .form-select:focus, textarea.form-input:focus{outline:none;border-color:var(--gold);}
textarea.form-input{resize:vertical;min-height:90px;line-height:1.5;}
.form-row{display:flex;gap:12px;flex-wrap:wrap;}
.form-row .form-group{flex:1;min-width:160px;}
.form-hint{font-size:11.5px;color:var(--dim);}
.btn-primary{background:var(--gold);color:var(--bg);border:none;border-radius:999px;padding:11px 22px;font-size:13.5px;font-weight:700;cursor:pointer;}
.btn-primary:hover{opacity:0.9;}
.btn-secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:999px;padding:11px 22px;font-size:13.5px;font-weight:700;cursor:pointer;}
.btn-secondary:hover{border-color:var(--gold);}
.unsaved-banner{background:var(--gold);color:var(--bg);padding:10px 16px;border-radius:10px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;font-size:13px;font-weight:600;flex-wrap:wrap;}
.unsaved-banner button{background:var(--bg);color:var(--gold);border:none;border-radius:999px;padding:7px 14px;font-weight:700;cursor:pointer;font-size:12.5px;}
.dual-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media (max-width:640px){.dual-col{grid-template-columns:1fr;}}
.dual-col>div{min-width:0;}
.site-nav{display:flex;gap:8px;justify-content:flex-end;margin-bottom:14px;position:sticky;top:0;z-index:10;background:var(--bg);padding:10px 0;}
.site-nav a{color:var(--dim);font-size:13px;text-decoration:none;border:1px solid var(--line);padding:6px 14px;border-radius:999px;}
.site-nav a:hover{border-color:var(--gold);color:var(--text);}
.site-nav a.current{color:var(--bg);background:var(--gold);border-color:var(--gold);}
</style>
</head>

<script>
// Folder layout expected alongside this file:
//   data/historical.json   — the frozen archive
//   data/matches/*.json    — timestamped incremental batches (see downloadPendingMatches below)
//
// Live data model:
//  - HISTORICAL_MATCHES: loaded from data/historical.json (the frozen archive built from the
//    WhatsApp chat exports). Falls back to the embedded snapshot below if it can't be fetched.
//  - PUBLISHED_NEW_MATCHES: every match anyone has published since then, loaded by auto-discovering
//    and merging every file in the repo's data/matches/ folder (each one is a small timestamped
//    batch — see downloadPendingMatches below).
//  - PENDING_MATCHES: matches added via the "+ Add Match" tab in *this* browser session that haven't
//    been downloaded/published yet.
//  - MATCHES is always the three combined.
// If you're hosting this on a custom domain (not username.github.io), set GITHUB_REPO below to
// "owner/repo" so match-file discovery still works — otherwise it's auto-detected from the hostname.
const GITHUB_REPO = '';

const EMBEDDED_FALLBACK = JSON.parse(document.getElementById('embedded-fallback').textContent);
// Player name merges (e.g. "Kush" and "Kushal" being the same person) are tracked as an auditable
// record in data/player-aliases.json — every entry there is a merge that's been made, with a note
// and date. Names are normalized to their canonical form the moment data loads, so every view
// (matches, players, analytics) and the player-card page agree.
const EMBEDDED_ALIASES_FALLBACK = JSON.parse(document.getElementById('embedded-aliases').textContent);
let PLAYER_ALIASES = [];
let ALIAS_MAP = new Map();
let HISTORICAL_MATCHES = [];
let PUBLISHED_NEW_MATCHES = [];
let PENDING_MATCHES = [];
let MATCHES = [];
let dataSource = 'loading';
let state = { view: 'matches', grp: 'all', year: '2026', ground: 'all', search: '', playerFilter: null, sort: 'desc', unsaved: false };

async function fetchJsonSafe(url, fallback){
  try {
    const r = await fetch(url, {cache: 'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } catch(e){
    console.warn('Could not load '+url+' — using fallback.', e);
    return fallback;
  }
}

function detectGithubRepo(){
  if(GITHUB_REPO) return GITHUB_REPO.split('/');
  const host = (typeof location !== 'undefined' && location.hostname) || '';
  const m = host.match(/^([^.]+)\.github\.io$/i);
  if(!m) return null;
  const owner = m[1];
  const parts = location.pathname.split('/').filter(Boolean);
  const repo = parts.length ? parts[0] : `${owner}.github.io`;
  return [owner, repo];
}

async function discoverMatchFileUrls(){
  const info = detectGithubRepo();
  if(!info) return [];
  const [owner, repo] = info;
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/matches`, {cache: 'no-store'});
    if(!r.ok) return []; // e.g. 404 before the data/matches/ folder exists yet — that's fine
    const list = await r.json();
    if(!Array.isArray(list)) return [];
    return list.filter(f=>f.type==='file' && f.name.toLowerCase().endsWith('.json')).map(f=>f.download_url);
  } catch(e){
    console.warn('Could not list matches/ folder via GitHub API.', e);
    return [];
  }
}

function buildAliasMap(list){
  const map = new Map();
  (list||[]).forEach(a=>{ if(a && a.alias && a.canonical) map.set(a.alias, a.canonical); });
  return map;
}
function normalizeName(n){
  return ALIAS_MAP.get(n) || n;
}
function recomputeMatches(){
  MATCHES = HISTORICAL_MATCHES.concat(PUBLISHED_NEW_MATCHES).concat(PENDING_MATCHES).map(m=>({
    ...m,
    p: m.p.map(p=>({...p, n: normalizeName(p.n)})),
    d: (m.d||[]).map(d=>({...d, n: normalizeName(d.n)}))
  }));
}

async function loadData(){
  const a = await fetchJsonSafe('data/player-aliases.json', null);
  PLAYER_ALIASES = a === null ? EMBEDDED_ALIASES_FALLBACK : a;
  ALIAS_MAP = buildAliasMap(PLAYER_ALIASES);

  const h = await fetchJsonSafe('data/historical.json', null);
  if(h === null){
    HISTORICAL_MATCHES = EMBEDDED_FALLBACK;
    dataSource = 'offline';
  } else {
    HISTORICAL_MATCHES = h;
    dataSource = 'live';
  }

  const fileUrls = await discoverMatchFileUrls();
  const chunks = await Promise.all(fileUrls.map(u=>fetchJsonSafe(u, [])));
  PUBLISHED_NEW_MATCHES = chunks.flat();
  PENDING_MATCHES = [];
  recomputeMatches();
  render();
}

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function normalizeGround(loc){
  if(!loc) return 'Unknown';
  let g = loc.split(',')[0];
  g = g.replace(/[\(<][^)>]*[\)>]/g, '');
  g = g.split(' - ')[0];
  g = g.trim();
  if(!g) return 'Unknown';
  if(/olympian/i.test(g)) g = 'Apollo';
  return g;
}
function grounds(){
  return [...new Set(MATCHES.map(m=>normalizeGround(m.loc)))]
    .filter(g=>g!=='TBD' && g!=='Unknown')
    .sort();
}
const ESTIMATED_TOTAL = 4500;
function isEstimated(m){
  return !m.total;
}
function matchTotal(m){
  return m.total || ESTIMATED_TOTAL;
}
function matchPerHead(m){
  if(m.perHead) return m.perHead;
  return m.p.length ? Math.round(ESTIMATED_TOTAL / m.p.length) : ESTIMATED_TOTAL;
}

function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function playerCounts(){
  const m = new Map();
  for(const match of scopedByYearGroup()){
    // De-dupe names within a match: guest slots reuse the inviter's name (n), so without this a
    // player who brought guests would get extra games counted that aren't actually theirs.
    for(const n of new Set(match.p.map(p=>p.n))){
      m.set(n, (m.get(n)||0)+1);
    }
  }
  return [...m.entries()].sort((a,b)=>b[1]-a[1]);
}

function renderAnalytics(){
  let list = scopedByYearGroup();
  if(state.ground!=='all') list = list.filter(m=>normalizeGround(m.loc)===state.ground);

  const totalSpent = list.reduce((s,m)=>s+matchTotal(m),0);
  const byYear = new Map();
  list.forEach(m=>byYear.set(m.yr, (byYear.get(m.yr)||0)+matchTotal(m)));
  const estimatedCount = list.filter(isEstimated).length;

  // Per-player spend: each player who played a game pays that game's Per Head amount
  // (or an estimated per-head share of the ₹4500 assumed total, for games with no figure in chat).
  const spend = new Map(), pays = new Map();
  list.forEach(m=>{
    const ph = matchPerHead(m);
    // De-dupe names within a match (see playerCounts note above) so a guest slot logged under
    // the inviter's name doesn't inflate that player's spend/games-played count.
    new Set(m.p.map(p=>p.n)).forEach(n=>{ spend.set(n,(spend.get(n)||0)+ph); pays.set(n,(pays.get(n)||0)+1); });
  });
  const spendArr = [...spend.entries()].sort((a,b)=>b[1]-a[1]);

  // Months with most games
  const byMonth = new Map();
  list.forEach(m=>{
    const key = m.date.slice(0,7); // YYYY-MM
    byMonth.set(key, (byMonth.get(key)||0)+1);
  });
  const monthArr = [...byMonth.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
  const monthMax = monthArr.length ? Math.max(...monthArr.map(x=>x[1])) : 1;

  // Total spent, year wise (bar chart version of byYear)
  const yearArr = [...byYear.entries()].sort((a,b)=>a[0].localeCompare(b[0]));
  const yearMax = yearArr.length ? Math.max(...yearArr.map(x=>x[1])) : 1;

  // Total spend per player, for the players who came to the most games
  const avgArr = spendArr.map(([n,amt])=>[n, amt, pays.get(n)]).sort((a,b)=>b[2]-a[2]).slice(0,10);
  const avgMax = avgArr.length ? Math.max(...avgArr.map(x=>x[1])) : 1;

  // Location of games
  const byLoc = new Map();
  list.forEach(m=>{ const g = normalizeGround(m.loc); byLoc.set(g, (byLoc.get(g)||0)+1); });
  const locArr = [...byLoc.entries()].sort((a,b)=>b[1]-a[1]);
  const locMax = locArr.length ? Math.max(...locArr.map(x=>x[1])) : 1;

  // Midweek vs weekend turnout — average headcount per game, by group
  const midweekMatches = list.filter(m=>m.grp==='m');
  const weekendMatches = list.filter(m=>m.grp==='w');
  const avgHeadcount = arr => arr.length ? Math.round(arr.reduce((s,m)=>s+m.p.length,0)/arr.length) : 0;
  const avgMidweek = avgHeadcount(midweekMatches);
  const avgWeekend = avgHeadcount(weekendMatches);

  // Day-of-week breakdown — count of games by weekday
  const WD_ORDER = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const byWeekday = new Map();
  list.forEach(m=>byWeekday.set(m.wd, (byWeekday.get(m.wd)||0)+1));
  const wdArr = WD_ORDER.filter(wd=>byWeekday.has(wd)).map(wd=>[wd, byWeekday.get(wd)]);
  const wdMax = wdArr.length ? Math.max(...wdArr.map(x=>x[1])) : 1;

  // Attendance streaks — longest run of consecutive matches (within this scope) a player played in,
  // plus their current streak if it's still active as of the most recent match.
  const orderedMatches = list.slice().sort((a,b)=>a.date.localeCompare(b.date));
  const allNames = new Set();
  orderedMatches.forEach(m=>m.p.forEach(p=>allNames.add(p.n)));
  const streakArr = [...allNames].map(name=>{
    let longest = 0, running = 0;
    orderedMatches.forEach(m=>{
      if(m.p.some(p=>p.n===name)){ running++; longest = Math.max(longest, running); }
      else running = 0;
    });
    let current = 0;
    for(let i=orderedMatches.length-1;i>=0;i--){
      if(orderedMatches[i].p.some(p=>p.n===name)) current++;
      else break;
    }
    return [name, longest, current];
  }).sort((a,b)=>b[1]-a[1]).slice(0,7);
  const streakMax = streakArr.length ? Math.max(...streakArr.map(x=>x[1])) : 1;

  return `
    <div class="stat-row">
      <div class="stat"><div class="n">₹${totalSpent}</div><div class="l">Total spent</div></div>
      ${[...byYear.keys()].sort().map(y=>`<div class="stat"><div class="n">₹${byYear.get(y)}</div><div class="l">${esc(y)}</div></div>`).join('')}
    </div>

    <h3 style="margin:22px 2px 10px;font-size:14px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;">Months with most games</h3>
    <div class="player-table">${monthArr.length ? monthArr.map(([key,c])=>{
      const [y,mo] = key.split('-');
      const label = `${MONTH_NAMES[parseInt(mo,10)-1]} ${y}`;
      return `<div class="row"><div class="name" style="flex:1.4;">${esc(label)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/monthMax*100)}%"></div></div><div class="cnt">${c}</div></div>`;
    }).join('') : '<div class="empty">No games in this scope.</div>'}</div>

    <h3 style="margin:26px 2px 10px;font-size:14px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;">Total spent, year wise</h3>
    <div class="player-table">${yearArr.length ? yearArr.map(([y,amt])=>{
      return `<div class="row"><div class="name" style="flex:1.4;">${esc(y)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/yearMax*100)}%"></div></div><div class="cnt" style="width:auto;">₹${amt}</div></div>`;
    }).join('') : '<div class="empty">No payments recorded.</div>'}</div>

    <h3 style="margin:26px 2px 10px;font-size:14px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;">Total spend per player — most frequent players</h3>
    <div class="player-table">${avgArr.length ? avgArr.map(([n,amt,c])=>{
      return `<div class="row"><div class="name" style="flex:1.4;">${esc(n)} <span style="color:var(--dim);">(${c} game${c===1?'':'s'})</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(amt/avgMax*100)}%"></div></div><div class="cnt" style="width:auto;">₹${amt}</div></div>`;
    }).join('') : '<div class="empty">No payments recorded.</div>'}</div>

    <h3 style="margin:26px 2px 10px;font-size:14px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;">Location of games</h3>
    <div class="player-table">${locArr.length ? locArr.map(([g,c])=>{
      return `<div class="row"><div class="name" style="flex:1.4;">${esc(g)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/locMax*100)}%"></div></div><div class="cnt">${c}</div></div>`;
    }).join('') : '<div class="empty">No games in this scope.</div>'}</div>

    <div class="dual-col" style="margin-top:26px;">
      <div>
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;">Midweek vs weekend turnout</h3>
        <div class="stat-row" style="margin-bottom:0;">
          <div class="stat"><div class="n">${avgMidweek||'—'}</div><div class="l">Avg players · Midweek</div></div>
          <div class="stat"><div class="n">${avgWeekend||'—'}</div><div class="l">Avg players · Weekend</div></div>
        </div>
        <div class="form-hint" style="margin-top:8px;">${midweekMatches.length} midweek game${midweekMatches.length===1?'':'s'} · ${weekendMatches.length} weekend game${weekendMatches.length===1?'':'s'} in this scope.</div>
      </div>
      <div>
        <h3 style="margin:0 0 10px;font-size:14px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;">Day-of-week breakdown</h3>
        <div class="player-table">${wdArr.length ? wdArr.map(([wd,c])=>{
          return `<div class="row"><div class="name" style="flex:1;">${esc(wd)}</div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/wdMax*100)}%"></div></div><div class="cnt">${c}</div></div>`;
        }).join('') : '<div class="empty">No games in this scope.</div>'}</div>
      </div>
    </div>

const MONTH_LOOKUP = {jan:0,january:0,feb:1,february:1,mar:2,march:2,apr:3,april:3,may:4,jun:5,june:5,jul:6,july:6,aug:7,august:7,sep:8,sept:8,september:8,oct:9,october:9,nov:10,november:10,dec:11,december:11};

// Parses a pasted WhatsApp roster message (the kind posted after every game — "Day and Date:",
// "Time:", "Location:", "Total:", "Per Head:", then numbered Team A / Team B lists with ✅/✔/☑
// checkmarks, <+50> late-fee tags, and <100>/<+100> drop-out tags) into structured fields.
function parseWhatsAppRoster(text){
  const result = { date: null, time: null, loc: null, total: null, perHead: null, players: [], dropouts: [] };
  const clean = text.replace(/[​⁠﻿]/g, ''); // strip invisible word-joiner/zero-width chars

  let m = clean.match(/location\s*:?\s*([^\n]+)/i);
  if(m) result.loc = m[1].trim();

  m = clean.match(/time\s*:?\s*([^\n]+)/i);
  if(m) result.time = m[1].trim();

  m = clean.match(/(?:total|turf amount)\s*:?\s*₹?\s*(\d{2,6})/i);
  if(m) result.total = parseInt(m[1],10);

  m = clean.match(/per\s*head\s*:?\s*₹?\s*(\d{2,6})/i);
  if(m) result.perHead = parseInt(m[1],10);

  m = clean.match(/(?:day and date|date)\s*:?\s*([A-Za-z]+)?,?\s*(\d{1,2})(?:st|nd|rd|th)?\s+([A-Za-z]+)/i);
  if(m){
    const weekdayName = m[1];
    const day = parseInt(m[2],10);
    const monthIdx = MONTH_LOOKUP[m[3].toLowerCase()];
    if(monthIdx !== undefined){
      const now = new Date();
      let best = null;
      for(const yr of [now.getFullYear()-1, now.getFullYear(), now.getFullYear()+1]){
        const cand = new Date(yr, monthIdx, day);
        const wd = cand.toLocaleDateString('en-US', {weekday:'long'});
        if(!weekdayName || wd.toLowerCase() === weekdayName.toLowerCase()){ best = cand; break; }
      }
      if(!best) best = new Date(now.getFullYear(), monthIdx, day);
      const pad = n => String(n).padStart(2,'0');
      result.date = `${best.getFullYear()}-${pad(best.getMonth()+1)}-${pad(best.getDate())}`;
    }
  }

  const TICK_RE = /[✅✔☑]/;
  const LATE_RE = /<\s*\+?\s*50\s*>|\(late\)/i;
  const DROP_RE = /<\s*\+?\s*100\s*>|no\s*show/i;
  for(const rawLine of clean.split('\n')){
    const lm = rawLine.match(/^\s*\d+\.\s*(.+)$/);
    if(!lm) continue;
    const rest = lm[1].trim();
    const isDrop = DROP_RE.test(rest);
    const isLate = !isDrop && LATE_RE.test(rest);
    let name = rest
      .replace(/[✅✔☑]️?/g, '')
      .replace(/<\s*\+?\s*\d+\s*>/g, '')
      .replace(/\(late\)/ig, '')
      .replace(/no\s*show/ig, '')
      .trim();
    if(!name) continue;
    if(isDrop) result.dropouts.push(name);
    else if(isLate) result.players.push(name + ' *');
    else result.players.push(name);
  }

  return result;
}

function handleParsePaste(){
  const text = document.getElementById('add-paste').value;
  if(!text.trim()){ alert('Paste a WhatsApp roster message first.'); return; }
  const r = parseWhatsAppRoster(text);
  if(r.date) document.getElementById('add-date').value = r.date;
  if(r.loc) document.getElementById('add-loc').value = r.loc;
  if(r.time) document.getElementById('add-time').value = r.time;
  if(r.total != null) document.getElementById('add-total').value = r.total;
  if(r.perHead != null) document.getElementById('add-perhead').value = r.perHead;
  if(r.players.length) document.getElementById('add-players').value = r.players.join('\n');
  if(r.dropouts.length) document.getElementById('add-dropouts').value = r.dropouts.join('\n');

  const missing = [];
  if(!r.date) missing.push('date');
  if(!r.players.length) missing.push('players');
  if(missing.length) alert('Parsed what I could, but couldn\'t find: '+missing.join(', ')+'. Please fill those in manually.');
  else alert('Parsed! Review the fields below, then click "Add match".');
}

function parsePlayersInput(text){
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
    const late = /\*\s*$/.test(line);
    const name = line.replace(/\*\s*$/,'').trim();
    const obj = {n: name};
    if(late){ obj.l = 1; obj.f = 50; }
    return obj;
  });
}

function parseDropoutsInput(text){
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
    const m = line.match(/^(.+?)(?::\s*(\d+))?$/);
    const name = m[1].trim();
    const fee = m[2] ? parseInt(m[2],10) : 100;
    return {n:name, f:fee};
  });
}

function handleAddMatch(){
  const date = document.getElementById('add-date').value;
  if(!date){ alert('Please pick a date.'); return; }
  const grp = document.getElementById('add-grp').value;
  const loc = document.getElementById('add-loc').value.trim();
  const time = document.getElementById('add-time').value.trim();
  const playersText = document.getElementById('add-players').value;
  const dropoutsText = document.getElementById('add-dropouts').value;
  const totalVal = document.getElementById('add-total').value.trim();
  const perHeadVal = document.getElementById('add-perhead').value.trim();

  const p = parsePlayersInput(playersText);
  if(!p.length){ alert('Add at least one player who played.'); return; }
  const d = parseDropoutsInput(dropoutsText);

  if(MATCHES.some(m=>m.date===date)){
    if(!confirm('A match on this date already exists. Add another entry for the same date anyway?')) return;
  }

  const wd = new Date(date+'T00:00:00').toLocaleDateString('en-US', {weekday:'short'});
  const yr = date.slice(0,4);

  const match = { date, yr, wd, grp, loc: loc || 'TBD', time: time || null, p, d };
  if(totalVal) match.total = parseInt(totalVal,10);
  if(perHeadVal) match.perHead = parseInt(perHeadVal,10);
  else if(totalVal) match.perHead = Math.round(parseInt(totalVal,10)/p.length);

  PENDING_MATCHES.push(match);
  recomputeMatches();
  state.unsaved = true;
  state.view = 'matches';
  state.year = yr;
  state.grp = 'all';
  state.playerFilter = null;
  render();
}

function timestampFilename(){
  const d = new Date();
  const pad = n => String(n).padStart(2,'0');
  return `matches-${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}.json`;
}

// Downloads only the matches added since the last download/publish (not the full history) — each
// download is its own small timestamped file, so you upload it as a NEW file into the repo's
// matches/ folder rather than replacing an existing one. The dashboard discovers and merges every
// file in that folder automatically.
function downloadPendingMatches(){
  if(!PENDING_MATCHES.length){ alert('No new matches to publish yet — add one first.'); return; }
  const filename = timestampFilename();
  const json = JSON.stringify(PENDING_MATCHES, null, 2);
  const blob = new Blob([json], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  PUBLISHED_NEW_MATCHES = PUBLISHED_NEW_MATCHES.concat(PENDING_MATCHES);
  PENDING_MATCHES = [];
  recomputeMatches();
  state.unsaved = false;
  render();
}

function years(){
  return [...new Set(MATCHES.map(m=>m.yr))].sort();
}

function scopedByYearGroup(){
  let list = MATCHES.slice();
  if(state.grp!=='all') list = list.filter(m=>m.grp===state.grp);
  if(state.year!=='all') list = list.filter(m=>m.yr===state.year);
  return list;
}

function dropoutCounts(){
  const m = new Map();
  scopedByYearGroup().forEach(match=>(match.d||[]).forEach(d=>{ m.set(d.n, (m.get(d.n)||0)+1); }));
  return m;
}

function filteredMatches(){
  let list = MATCHES.slice();
  if(state.grp!=='all') list = list.filter(m=>m.grp===state.grp);
  if(state.year!=='all') list = list.filter(m=>m.yr===state.year);
  if(state.playerFilter) list = list.filter(m=>m.p.some(p=>p.n===state.playerFilter));
  if(state.search.trim()){
    const q = state.search.trim().toLowerCase();
    list = list.filter(m=>m.p.some(p=>p.n.toLowerCase().includes(q)) || (m.loc||'').toLowerCase().includes(q));
  }
  list.sort((a,b)=> state.sort==='desc' ? b.date.localeCompare(a.date) : a.date.localeCompare(b.date));
  return list;
}

function chipHTML(p){
  let tags = '';
  if(p.l) tags += '<span class="tag late">late</span>';
  if(p.g) tags += `<span class="tag g">+${p.g}${p.gn?': '+esc(p.gn):''}</span>`;
  return `<span class="chip" data-player="${esc(p.n)}">${esc(p.n)}${tags}</span>`;
}

function esc(s){ return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function matchCard(m){
  const grpLabel = m.grp==='m' ? 'Midweek' : 'Weekend';
  const meta = [m.loc, m.time].filter(Boolean).join(' · ');
  return `<div class="match-card">
    <div class="match-top">
      <div><span class="match-date">${fmtDate(m.date)}<span class="wd">${m.wd}</span></span></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="badge ${m.grp}">${grpLabel}</span>
        <span class="count-pill">${m.p.length} players</span>
      </div>
    </div>
    ${meta ? `<div class="match-meta">${esc(meta)}</div>` : ''}
    <div class="chip-row">${m.p.map(chipHTML).join('')}</div>
  </div>`;
}

function renderMatches(){
  const list = filteredMatches();
  if(!list.length) return '<div class="empty">No matches found.</div>';
  return list.map(matchCard).join('');
}

function renderPlayers(){
  const counts = playerCounts();
  const dcounts = dropoutCounts();
  const q = state.search.trim().toLowerCase();
  const filtered = q ? counts.filter(([n])=>n.toLowerCase().includes(q)) : counts;
  const max = counts.length ? counts[0][1] : 1;
  if(!filtered.length) return '<div class="empty">No players found.</div>';
  return `<div class="player-table">` + filtered.map(([n,c],i)=>{
    const dc = dcounts.get(n);
    return `<div class="row" data-player="${esc(n)}">
      <div class="rank">${i+1}</div>
      <div class="name">${esc(n)}${dc ? ` <span class="tag ns">dropped out ${dc}x</span>` : ''}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c/max*100)}%"></div></div>
      <div class="cnt">${c}</div>
    </div>`;
  }).join('') + `</div>`;
}

function render(){
  const scoped = MATCHES.filter(m => (state.year==='all' || m.yr===state.year));
  const totalMatches = scoped.length;
  const totalPlayers = new Set(scoped.flatMap(m=>m.p.map(p=>p.n))).size;
  const midweekCount = scoped.filter(m=>m.grp==='m').length;
  const weekendCount = scoped.filter(m=>m.grp==='w').length;
  const first = scoped[0] || MATCHES[0], last = scoped[scoped.length-1] || MATCHES[MATCHES.length-1];

  let body = '';
  if(state.playerFilter){
    const count = MATCHES.filter(m=>m.p.some(p=>p.n===state.playerFilter)).length;
    body += `<button class="back-btn" id="clear-player">← Clear filter</button>`;
    body += `<div class="player-detail">Showing <b style="color:var(--text)">${esc(state.playerFilter)}</b>'s ${count} match${count===1?'':'es'}</div>`;
  }

  document.getElementById('app').innerHTML = `
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="anyday-football.html">Players</a>
      <a class="current" href="anyday-match-archive.html">Match Archive</a>
    </nav>
    <h1>⚽ Anyday Football — Match Archive</h1>
    <div class="sub">Anyday Midweek &amp; Weekend Games · ${fmtDate(first.date)} – ${fmtDate(last.date)}</div>
    ${state.unsaved ? `<div class="unsaved-banner">
      <span>You've added match(es) not yet published to the group — download the file and upload it into the data/matches/ folder on GitHub.</span>
      <button id="download-banner-btn">⬇ Download match file</button>
    </div>` : ''}
    ${dataSource === 'offline' ? `<div class="unsaved-banner" style="background:var(--panel2);color:var(--dim);border:1px solid var(--line);">
      <span>Showing the offline snapshot — open this page via its hosted GitHub Pages URL to see live data from the group.</span>
    </div>` : ''}
    <div class="stat-row">
      <div class="stat"><div class="n">${totalMatches}</div><div class="l">Matches played</div></div>
      <div class="stat"><div class="n">${midweekCount}</div><div class="l">Midweek</div></div>
      <div class="stat"><div class="n">${weekendCount}</div><div class="l">Weekend</div></div>
      <div class="stat"><div class="n">${totalPlayers}</div><div class="l">Unique names</div></div>
    </div>
    <div class="controls">
      <div class="tabs">
        <button class="tab-btn ${state.view==='matches'?'active':''}" data-view="matches">Matches</button>
        <button class="tab-btn ${state.view==='players'?'active':''}" data-view="players">Players</button>
        <button class="tab-btn ${state.view==='analytics'?'active':''}" data-view="analytics">Analytics</button>
        <button class="tab-btn ${state.view==='add'?'active':''}" data-view="add">+ Add Match</button>
      </div>
      ${state.view!=='add' ? `<div class="pill-group" id="grp-pills">
        <button class="pill ${state.grp==='all'?'active':''}" data-grp="all">All</button>
        <button class="pill ${state.grp==='m'?'active':''}" data-grp="m">Midweek</button>
        <button class="pill ${state.grp==='w'?'active':''}" data-grp="w">Weekend</button>
      </div>
      <div class="pill-group" id="year-pills">
        ${years().map(y=>`<button class="pill ${state.year===y?'active':''}" data-year="${y}">${y}</button>`).join('')}
        <button class="pill ${state.year==='all'?'active':''}" data-year="all">All years</button>
      </div>` : ''}
      ${state.view==='analytics' ? `<div class="pill-group" id="ground-pills">
        <button class="pill ${state.ground==='all'?'active':''}" data-ground="all">All grounds</button>
        ${grounds().map(g=>`<button class="pill ${state.ground===g?'active':''}" data-ground="${esc(g)}">${esc(g)}</button>`).join('')}
      </div>` : ''}
      ${state.view!=='analytics' && state.view!=='add' ? `<input id="search" type="text" placeholder="Search player or location…" value="${esc(state.search)}">` : ''}
    </div>
    <div id="body">${body}</div>
    <div class="view ${state.view==='matches'?'active':''}" id="matches-view">${state.view==='matches' ? renderMatches() : ''}</div>
    <div class="view ${state.view==='players'?'active':''}" id="players-view">${state.view==='players' ? renderPlayers() : ''}</div>
    <div class="view ${state.view==='analytics'?'active':''}" id="analytics-view">${state.view==='analytics' ? renderAnalytics() : ''}</div>
    <div class="view ${state.view==='add'?'active':''}" id="add-view">${state.view==='add' ? renderAddMatch() : ''}</div>
    <footer class="tag">${totalMatches} matches · generated from chat export</footer>
  `;

  const searchEl = document.getElementById('search');
  if(searchEl) searchEl.addEventListener('input', e=>{
    // Re-rendering via innerHTML destroys and recreates the <input>, which drops focus and
    // closes the mobile keyboard after every keystroke. Re-focus the new node synchronously
    // (same tick) and restore the cursor position so typing feels continuous on mobile.
    const cursorPos = e.target.selectionStart;
    state.search = e.target.value;
    render();
    const newSearchEl = document.getElementById('search');
    if(newSearchEl){
      newSearchEl.focus();
      newSearchEl.setSelectionRange(cursorPos, cursorPos);
    }
  });
  document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click', ()=>{ state.view=b.dataset.view; render(); }));
  document.querySelectorAll('#grp-pills .pill').forEach(b=>b.addEventListener('click', ()=>{ state.grp=b.dataset.grp; render(); }));
  document.querySelectorAll('#year-pills .pill').forEach(b=>b.addEventListener('click', ()=>{ state.year=b.dataset.year; render(); }));
  document.querySelectorAll('#ground-pills .pill').forEach(b=>b.addEventListener('click', ()=>{ state.ground=b.dataset.ground; render(); }));
  document.querySelectorAll('[data-player]').forEach(el=>el.addEventListener('click', ()=>{
    state.playerFilter = el.dataset.player; state.view='matches'; render();
  }));
  const clearBtn = document.getElementById('clear-player');
  if(clearBtn) clearBtn.addEventListener('click', ()=>{ state.playerFilter=null; render(); });
  const addSaveBtn = document.getElementById('add-save-btn');
  if(addSaveBtn) addSaveBtn.addEventListener('click', handleAddMatch);
  const addDownloadBtn = document.getElementById('add-download-btn');
  if(addDownloadBtn) addDownloadBtn.addEventListener('click', downloadPendingMatches);
  const bannerDownloadBtn = document.getElementById('download-banner-btn');
  if(bannerDownloadBtn) bannerDownloadBtn.addEventListener('click', downloadPendingMatches);
  const parseBtn = document.getElementById('add-parse-btn');
  if(parseBtn) parseBtn.addEventListener('click', handleParsePaste);
}

loadData();
</script>
