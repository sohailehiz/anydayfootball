<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anyday Football</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --pitch-dark:#08281c;
  --pitch:#0f4230;
  --pitch-mid:#123f2e;
  --line:rgba(245,243,236,0.10);
  --chalk:#f5f3ec;
  --chalk-dim:rgba(245,243,236,0.62);
  --ink:#081712;
  --gold:#c9a227;
  --gold-light:#e8c766;
  --floodlight:#ffdd57;
  --bronze:#a9673b;
  --bronze-light:#c98a5e;
  --silver:#9aa5b1;
  --silver-light:#c3cbd2;
  --legendary:#5b3aa0;
  --legendary-light:#9a6fe0;
  --pending:#e0a740;
  --radius:14px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:transparent;}
body{
  font-family:'Inter',sans-serif;
  color:var(--chalk);
  min-height:100vh;
}

#app{
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 8%, rgba(255,221,87,0.06), transparent 40%),
    repeating-linear-gradient(90deg, var(--pitch) 0px, var(--pitch) 64px, var(--pitch-mid) 64px, var(--pitch-mid) 128px),
    var(--pitch-dark);
  position:relative;
  overflow-x:hidden;
}

.wrap{max-width:1040px;margin:0 auto;padding:28px 20px 80px;}

/* ---------- Type ---------- */
.display{font-family:'Anton',sans-serif;letter-spacing:0.5px;text-transform:uppercase;}
.mono{font-family:'Space Mono',monospace;}

h1.brand{
  font-family:'Anton',sans-serif;
  font-size:clamp(34px,6vw,54px);
  letter-spacing:1px;
  margin:0;
  line-height:0.95;
}
h1.brand span{color:var(--floodlight);}

.tagline{color:var(--chalk-dim);font-size:15px;margin-top:8px;max-width:480px;}

/* ---------- Header / nav ---------- */
header.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;
  border-bottom:1px solid var(--line);
}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-ball{font-size:22px;}
.logo-text{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:0.5px;}
.who{font-size:13px;color:var(--chalk-dim);text-align:right;}
.who b{color:var(--floodlight);font-weight:600;}
.switch-btn{
  background:none;border:1px solid var(--line);color:var(--chalk-dim);
  font-size:12px;padding:5px 10px;border-radius:20px;cursor:pointer;margin-left:8px;
  font-family:'Inter',sans-serif;
}
.switch-btn:hover{border-color:var(--floodlight);color:var(--floodlight);}

/* ---------- Ticket-stub tab nav ---------- */
.ticket-nav{
  display:flex;gap:0;margin:26px 0 8px;
  border-top:1px dashed var(--line);
  border-bottom:1px dashed var(--line);
  position:relative;
}
.ticket-nav::before,.ticket-nav::after{
  content:"";position:absolute;width:18px;height:18px;border-radius:50%;
  background:var(--pitch-dark);top:-9px;
}
.ticket-nav::before{left:-9px;}
.ticket-nav::after{right:-9px;}
.tab-btn{
  flex:1;background:none;border:none;border-right:1px dashed var(--line);
  color:var(--chalk-dim);font-family:'Anton',sans-serif;letter-spacing:0.5px;
  font-size:13px;padding:14px 6px;cursor:pointer;text-transform:uppercase;
  transition:color .15s, background .15s;
}
.tab-btn:last-child{border-right:none;}
.tab-btn.active{color:var(--ink);background:var(--floodlight);}
.tab-btn:not(.active):hover{color:var(--chalk);}

/* ---------- Buttons ---------- */
.btn{
  font-family:'Inter',sans-serif;font-weight:600;font-size:14px;
  padding:12px 20px;border-radius:8px;border:none;cursor:pointer;
  transition:transform .1s ease, filter .15s ease;
}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--floodlight);color:var(--ink);}
.btn-primary:hover{filter:brightness(1.08);}
.btn-outline{background:none;color:var(--chalk);border:1px solid var(--chalk-dim);}
.btn-outline:hover{border-color:var(--floodlight);color:var(--floodlight);}
.btn-gold{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--ink);}
.btn-danger{background:none;color:#e0876a;border:1px solid #e0876a55;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn-block{width:100%;}

/* ---------- Landing ---------- */
.landing-hero{
  display:grid;grid-template-columns:1.1fr 0.9fr;gap:40px;align-items:center;
  padding:50px 0 20px;
}
@media(max-width:820px){.landing-hero{grid-template-columns:1fr;}}
.cta-row{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap;}
.wa-btn{
  background:#25D366;color:#08281c;font-weight:700;
}
.wa-btn:hover{filter:brightness(1.06);}

.mini-note{color:var(--chalk-dim);font-size:12.5px;margin-top:14px;max-width:420px;line-height:1.5;}

/* ---------- Card ---------- */
.card-stage{perspective:1000px;display:flex;justify-content:center;}
.fifa-card{
  width:250px;height:360px;border-radius:16px;position:relative;
  padding:18px 16px;transform-style:preserve-3d;transition:transform .12s ease-out;
  box-shadow:0 20px 40px rgba(0,0,0,0.45);
  overflow:hidden;
}
.fifa-card.tier-bronze{background:linear-gradient(155deg,#c98a5e,#7a4326 60%,#5c3018);}
.fifa-card.tier-silver{background:linear-gradient(155deg,#dbe2e8,#9aa5b1 55%,#5f6771);}
.fifa-card.tier-gold{background:linear-gradient(155deg,var(--gold-light),var(--gold) 55%,#8a6c14);}
.fifa-card.tier-legendary{background:linear-gradient(155deg,#9a6fe0,#5b3aa0 55%,#241246);}
.fifa-card::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.35) 32%, transparent 44%);
  transform:translateX(-120%);
  pointer-events:none;
}
.fifa-card.shine::before{animation:sheen 1.1s ease;}
@keyframes sheen{to{transform:translateX(120%);}}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2;}
.card-rating{font-family:'Anton',sans-serif;font-size:40px;line-height:0.85;color:var(--ink);}
.card-stars{font-size:12px;color:var(--ink);margin-top:2px;letter-spacing:1px;}
.card-nation{font-size:22px;}
.card-avatar-wrap{
  display:flex;justify-content:center;margin-top:2px;position:relative;z-index:2;
}
.card-avatar{
  width:104px;height:104px;border-radius:50%;
  background:var(--ink);border:3px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.card-avatar img{width:100%;height:100%;object-fit:cover;}
.card-name{
  text-align:center;font-family:'Anton',sans-serif;font-size:17px;color:var(--ink);
  margin-top:8px;letter-spacing:0.5px;position:relative;z-index:2;
  text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-club-line{
  text-align:center;font-size:10.5px;color:var(--ink);opacity:0.75;margin-top:2px;position:relative;z-index:2;
}
.card-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:4px 14px;margin-top:12px;
  font-family:'Space Mono',monospace;font-size:12px;color:var(--ink);position:relative;z-index:2;
}
.card-stats div{display:flex;justify-content:space-between;}
.card-stats b{font-weight:700;}
.tier-badge{
  position:absolute;bottom:10px;right:14px;font-size:9px;letter-spacing:1.5px;
  color:var(--ink);opacity:0.6;font-family:'Anton',sans-serif;z-index:2;
}

/* ---------- Flip card ---------- */
.flip-wrap{width:250px;height:360px;perspective:1200px;margin:0 auto;cursor:pointer;}
.flip-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,.2,.2,1);transform-style:preserve-3d;}
.flip-wrap.flipped .flip-inner{transform:rotateY(180deg);}
.card-face{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;-webkit-backface-visibility:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.45);}
.card-face.back{transform:rotateY(180deg);padding:22px 20px;display:flex;flex-direction:column;}
.back-label{font-family:'Anton',sans-serif;font-size:11px;letter-spacing:2px;color:var(--ink);opacity:0.6;text-transform:uppercase;margin-bottom:14px;}
.back-row{margin-bottom:14px;}
.back-row .bl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink);opacity:0.55;font-family:'Inter',sans-serif;}
.back-row .bv{font-family:'Anton',sans-serif;font-size:17px;color:var(--ink);letter-spacing:0.3px;text-transform:uppercase;}
.back-row .bv small{font-family:'Inter',sans-serif;font-size:11px;opacity:0.7;text-transform:none;}
.flip-hint{
  position:absolute;bottom:10px;left:14px;font-size:9px;letter-spacing:1px;color:var(--ink);
  opacity:0.55;z-index:2;font-family:'Inter',sans-serif;
}

/* mini card for community grid */
.mini-card{
  width:100%;aspect-ratio:5/7;border-radius:10px;padding:10px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  transition:transform .12s;
}
.mini-card:hover{transform:translateY(-4px);}
.mini-card .mr{font-family:'Anton',sans-serif;font-size:22px;color:var(--ink);align-self:flex-start;}
.mini-card .mav{width:56px;height:56px;border-radius:50%;background:var(--ink);margin:4px 0;overflow:hidden;border:2px solid rgba(255,255,255,0.5);}
.mini-card .mav img{width:100%;height:100%;object-fit:cover;}
.mini-card .mname{font-family:'Anton',sans-serif;font-size:11px;color:var(--ink);text-align:center;text-transform:uppercase;}
.mini-card .mstars{font-size:9px;color:var(--ink);opacity:0.7;}

/* ---------- Panels / forms ---------- */
.panel{
  background:rgba(245,243,236,0.04);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px;margin-top:18px;
}
.panel h2{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:0.5px;margin:0 0 4px;text-transform:uppercase;}
.panel .sub{color:var(--chalk-dim);font-size:13px;margin-bottom:18px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;color:var(--chalk-dim);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.field input[type=text],.field input[type=tel],.field select{
  width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line);
  background:rgba(0,0,0,0.25);color:var(--chalk);font-family:'Inter',sans-serif;font-size:14px;
}
.field input:focus,.field select:focus{outline:1px solid var(--floodlight);}
.field input[type=range]{width:100%;accent-color:var(--floodlight);}
.range-val{font-family:'Space Mono',monospace;color:var(--floodlight);float:right;}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
.chip{
  background:rgba(255,221,87,0.12);border:1px solid var(--floodlight);color:var(--floodlight);
  padding:5px 10px;border-radius:20px;font-size:12.5px;display:flex;align-items:center;gap:6px;
}
.chip button{background:none;border:none;color:var(--floodlight);cursor:pointer;font-size:13px;padding:0;}
.avatar-upload{display:flex;align-items:center;gap:14px;}
.avatar-preview{width:64px;height:64px;border-radius:50%;background:var(--ink);overflow:hidden;border:2px solid var(--line);flex-shrink:0;}
.avatar-preview img{width:100%;height:100%;object-fit:cover;}

/* ---------- Pending ---------- */
.ticket{
  max-width:420px;margin:60px auto;background:var(--ink);border-radius:16px;
  padding:34px 28px;text-align:center;position:relative;border:1px solid var(--line);
}
.ticket .stamp{
  font-family:'Anton',sans-serif;font-size:13px;letter-spacing:2px;color:var(--pending);
  border:2px solid var(--pending);display:inline-block;padding:4px 12px;border-radius:6px;
  transform:rotate(-4deg);margin-bottom:16px;
}
.ticket h3{font-family:'Anton',sans-serif;font-size:22px;margin:6px 0;text-transform:uppercase;}
.ticket p{color:var(--chalk-dim);font-size:13.5px;line-height:1.6;}
.ticket .num{font-family:'Space Mono',monospace;color:var(--floodlight);font-size:15px;margin-top:10px;display:block;}

/* ---------- Community grid ---------- */
.community-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px;margin-top:8px;}
.empty-state{text-align:center;padding:50px 20px;color:var(--chalk-dim);}
.empty-state .big{font-size:34px;margin-bottom:10px;}

/* ---------- Stats ---------- */
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13.5px;}
.stat-row:last-child{border-bottom:none;}
.stat-row .lbl{color:var(--chalk-dim);}
.stat-row .val{font-family:'Space Mono',monospace;color:var(--floodlight);}
.bar-track{background:rgba(255,255,255,0.08);border-radius:6px;height:8px;overflow:hidden;flex:1;margin:0 12px;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--floodlight),var(--gold));}
.match-row{display:flex;justify-content:space-between;font-size:12.5px;padding:8px 0;border-bottom:1px dashed var(--line);color:var(--chalk-dim);}
.match-row b{color:var(--chalk);}
.report-card{
  background:linear-gradient(160deg,rgba(255,221,87,0.09),transparent);
  border:1px solid var(--floodlight);border-radius:12px;padding:22px;margin-top:16px;text-align:center;
}
.report-card h3{font-family:'Anton',sans-serif;color:var(--floodlight);letter-spacing:1px;margin:0 0 14px;text-transform:uppercase;}
.report-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;text-align:left;}
.report-grid .n{font-family:'Anton',sans-serif;font-size:26px;color:var(--chalk);}
.report-grid .l{font-size:11px;color:var(--chalk-dim);text-transform:uppercase;letter-spacing:0.5px;}

/* ---------- Modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(4,12,8,0.7);display:flex;align-items:center;justify-content:center;
  z-index:50;padding:20px;
}
.modal{
  background:var(--pitch-dark);border:1px solid var(--line);border-radius:14px;
  padding:26px;max-width:420px;width:100%;max-height:86vh;overflow-y:auto;
}
.modal h3{font-family:'Anton',sans-serif;font-size:19px;text-transform:uppercase;margin:0 0 14px;}
.modal-close{float:right;background:none;border:none;color:var(--chalk-dim);font-size:18px;cursor:pointer;}

/* ---------- WhatsApp sim ---------- */
.wa-window{
  max-width:380px;margin:40px auto;background:#0b141a;border-radius:14px;overflow:hidden;border:1px solid var(--line);
}
.wa-head{background:#202c33;padding:14px 16px;font-size:14px;font-weight:600;color:#e9edef;display:flex;align-items:center;gap:8px;}
.wa-body{padding:18px 14px;min-height:160px;background:#0b141a url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="4" height="4"><rect width="4" height="4" fill="%230b141a"/></svg>');}
.wa-bubble{
  background:#202c33;color:#e9edef;padding:10px 12px;border-radius:8px;font-size:13.5px;max-width:85%;margin-bottom:10px;line-height:1.5;
}
.wa-bubble.me{background:#005c4b;margin-left:auto;}
.wa-input-row{display:flex;gap:8px;padding:12px;background:#202c33;}
.wa-input-row input{flex:1;border-radius:20px;border:none;padding:9px 14px;font-size:13.5px;}
.wa-input-row button{background:#00a884;border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:15px;}

/* admin */
.admin-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--line);}
.admin-row .info{font-size:13px;}
.admin-row .info .p{color:var(--chalk-dim);font-family:'Space Mono',monospace;font-size:11.5px;}
.pill{font-size:10.5px;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;}
.pill.pending{background:rgba(224,167,64,0.15);color:var(--pending);}
.pill.approved{background:rgba(37,211,102,0.15);color:#4ee08a;}

.admin-fab{
  position:fixed;bottom:18px;right:18px;background:var(--ink);border:1px solid var(--line);
  color:var(--chalk-dim);width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:15px;z-index:30;
}
footer.tag{text-align:center;color:var(--chalk-dim);font-size:11.5px;margin-top:50px;letter-spacing:0.5px;}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============ Optional shared backend (Supabase) ============
   Fill these in with your own Supabase project's URL and anon key
   to give this app a real, shared database across every device.
   Leave them as-is to keep running in local/device-only mode. */
const SUPABASE_URL = 'https://nszzhghwhevxcybzprlk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_jSgeli_BnshhZwxeBkwTEQ_ccDXobfS';

function isSupabaseConfigured(){
  return SUPABASE_URL && SUPABASE_ANON_KEY &&
    SUPABASE_URL.indexOf('YOUR_') !== 0 && SUPABASE_ANON_KEY.indexOf('YOUR_') !== 0;
}
let _supabaseClient = null;
function getSupabase(){
  if(!isSupabaseConfigured()) return null;
  if(!_supabaseClient && window.supabase){
    _supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  }
  return _supabaseClient;
}
function storageModeLabel(){
  if(typeof window.storage !== 'undefined' && window.storage) return 'Running inside Claude — data is shared via Claude\'s preview storage.';
  if(getSupabase()) return 'Connected to Supabase — data is shared with everyone using this link.';
  return 'Local demo mode — data is only stored on this device/browser. Configure Supabase in index.html for a real shared community.';
}

const storageAdapter = {
  async get(key, shared){
    if(typeof window.storage !== 'undefined' && window.storage){
      try{ return await window.storage.get(key, shared); }catch(e){ return null; }
    }
    const sb = getSupabase();
    if(sb){
      try{
        const { data, error } = await sb.from('kv_store').select('value').eq('key', key).maybeSingle();
        if(error || !data) return null;
        return {key, value: data.value, shared:true};
      }catch(e){ return null; }
    }
    try{ const v = localStorage.getItem(key); return v ? {key, value:v, shared:!!shared} : null; }catch(e){ return null; }
  },
  async set(key, value, shared){
    if(typeof window.storage !== 'undefined' && window.storage){
      try{ return await window.storage.set(key, value, shared); }catch(e){ return null; }
    }
    const sb = getSupabase();
    if(sb){
      try{
        const { error } = await sb.from('kv_store').upsert({key, value, updated_at: new Date().toISOString()});
        if(error) return null;
        return {key, value, shared:true};
      }catch(e){ return null; }
    }
    try{ localStorage.setItem(key, value); return {key, value, shared:!!shared}; }catch(e){ return null; }
  },
  async delete(key, shared){
    if(typeof window.storage !== 'undefined' && window.storage){
      try{ return await window.storage.delete(key, shared); }catch(e){ return null; }
    }
    const sb = getSupabase();
    if(sb){
      try{
        const { error } = await sb.from('kv_store').delete().eq('key', key);
        if(error) return null;
        return {key, deleted:true, shared:true};
      }catch(e){ return null; }
    }
    try{ localStorage.removeItem(key); return {key, deleted:true, shared:!!shared}; }catch(e){ return null; }
  },
  async list(prefix, shared){
    if(typeof window.storage !== 'undefined' && window.storage){
      try{ return await window.storage.list(prefix, shared); }catch(e){ return {keys:[]}; }
    }
    const sb = getSupabase();
    if(sb){
      try{
        let q = sb.from('kv_store').select('key');
        if(prefix) q = q.like('key', prefix+'%');
        const { data, error } = await q;
        if(error || !data) return {keys:[]};
        return {keys: data.map(r=>r.key), prefix, shared:true};
      }catch(e){ return {keys:[]}; }
    }
    try{
      const keys = [];
      for(let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if(!prefix || (k && k.indexOf(prefix)===0)) keys.push(k);
      }
      return {keys, prefix, shared:!!shared};
    }catch(e){ return {keys:[]}; }
  }
};

/* ============ Storage helpers ============ */
async function getUser(phone){
  try{
    const r = await storageAdapter.get('user:'+phone, true);
    return r ? JSON.parse(r.value) : null;
  }catch(e){ return null; }
}
async function saveUser(profile){
  await storageAdapter.set('user:'+profile.phone, JSON.stringify(profile), true);
}
async function listUsers(){
  try{
    const r = await storageAdapter.list('user:', true);
    if(!r || !r.keys) return [];
    const out = [];
    for(const k of r.keys){
      try{
        const v = await storageAdapter.get(k, true);
        if(v) out.push(JSON.parse(v.value));
      }catch(e){}
    }
    return out;
  }catch(e){ return []; }
}
function normPhone(s){ return (s||'').replace(/[^0-9]/g,''); }

async function isInRoster(phone){
  try{
    const r = await storageAdapter.get('roster:'+phone, true);
    return !!r;
  }catch(e){ return false; }
}
async function addRosterNumber(phone){
  await storageAdapter.set('roster:'+phone, JSON.stringify({phone, addedAt:Date.now()}), true);
}
async function removeRosterNumber(phone){
  try{ await storageAdapter.delete('roster:'+phone, true); }catch(e){}
}
async function listRoster(){
  try{
    const r = await storageAdapter.list('roster:', true);
    if(!r || !r.keys) return [];
    return r.keys.map(k=>k.replace('roster:',''));
  }catch(e){ return []; }
}

/* ============ Rating math ============ */
function computeOverall(u){
  const base = Math.round((u.speed + u.stamina)/2);
  const bonus = Math.round(Math.min(u.gamesPlayed,30)/3);
  return Math.max(1, Math.min(99, base + bonus));
}
function computeStars(overall){
  return Math.max(1, Math.min(5, Math.ceil(overall/20)));
}
function computeTier(overall){
  if(overall>=90) return 'legendary';
  if(overall>=75) return 'gold';
  if(overall>=60) return 'silver';
  return 'bronze';
}
function starString(n){
  let s='';
  for(let i=0;i<5;i++) s += i<n ? '★' : '☆';
  return s;
}
function nationFlag(name){
  const f = NATIONS.find(n=>n[0]===name);
  return f ? f[1] : '⚽';
}
function initials(name){
  if(!name) return '?';
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

    const grid = document.getElementById('community-grid');
    if(!grid) return;
    const miniCard = (u)=>{
      const overall = computeOverall(u);
      const tier = u.isBot ? 'legendary' : computeTier(overall);

      const av = u.isBot ? botAvatarSVG() : (u.avatar ? `<img src="${u.avatar}">` : defaultAvatarSVG(u.name));
      return `<div class="mini-card fifa-card tier-${tier}" style="padding:10px;">
        <div class="mr">${u.isBot ? '🤖' : overall}</div>
        <div class="mav">${av}</div>
        <div class="mname">${escapeHtml(u.name||'Player')}</div>
        <div class="mstars">${u.isBot ? 'mascot' : starString(stars)}</div>
      </div>`;
    };
    if(!approved.length){
      grid.innerHTML = (bot ? miniCard(bot) : '') + `<div class="empty-state" style="grid-column:1/-1;"><div class="big">🏟️</div>No human profiles approved yet. Register a second player and approve them from the admin panel to fill the squad.</div>`;
      return;
    }
    grid.innerHTML = (bot ? miniCard(bot) : '') + approved.map(miniCard).join('');
  }
}

/* ============ Handlers ============ */
function attachHandlers(){
  const speedEl = document.getElementById('f-speed');
  const staminaEl = document.getElementById('f-stamina');
  if(speedEl) speedEl.addEventListener('input', e=>{document.getElementById('speed-val').textContent = e.target.value;});
  if(staminaEl) staminaEl.addEventListener('input', e=>{document.getElementById('stamina-val').textContent = e.target.value;});
  const avFile = document.getElementById('avatar-file');
  if(avFile) avFile.addEventListener('change', handleAvatarFile);

  afterRender();
}

async function handleAvatarFile(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    document.getElementById('avatar-preview').innerHTML = `<img src="${reader.result}">`;
    root.dataset.pendingAvatar = reader.result;
  };
  reader.readAsDataURL(file);
}

async function onClick(e){
  const t = e.target;
  const actEl = t.closest('[data-act]');
  const act = actEl ? actEl.dataset.act : undefined;
  const tab = t.dataset.tab;
  const jump = t.dataset.tabJump;
  const rmClub = t.dataset.removeClub;

  if(act==='go-whatsapp'){ view='whatsapp'; render(); return; }
  if(act==='go-web'){ view='webform'; render(); return; }
  if(act==='back'){ view='landing'; render(); return; }

  if(act==='wa-send'){
    const phoneInput = document.getElementById('wa-phone');
    const phone = normPhone(phoneInput.value);
    if(!phone){ phoneInput.style.borderColor='#e0876a'; return; }
    document.getElementById('wa-echo').style.display='block';
    document.getElementById('wa-echo').textContent = phoneInput.value;
    await registerOrLogin(phone, null, 'whatsapp');
    return;
  }

  if(act==='web-submit'){
    const name = document.getElementById('web-name').value.trim();
    const phone = normPhone(document.getElementById('web-phone').value);
    if(!phone){ document.getElementById('web-phone').style.borderColor='#e0876a'; return; }
    await registerOrLogin(phone, name, 'web');
    return;
  }

  if(act==='refresh-status'){
    const fresh = await getUser(currentUser.phone);
    if(fresh) currentUser = fresh;
    routeAfterLogin();
    return;
  }

  if(act==='switch'){
    currentUser = null; view='landing'; activeTab='card'; render(); return;
  }

  if(act==='open-admin'){
    view='admin-loading'; renderLoading();
    const users = await listUsers();
    const roster = await listRoster();
    view='admin'; renderAdminView(users, roster);
    return;
  }

  if(act==='approve' || act==='reject'){
    const phone = actEl.dataset.phone;
    const u = await getUser(phone);
    if(!u) return;
    if(act==='approve') u.status='approved'; else u.status='rejected';
    await saveUser(u);
    const users = await listUsers();
    const roster = await listRoster();
    renderAdminView(users, roster);
    return;
  }

  if(act==='add-roster'){
    const box = document.getElementById('roster-input');
    const nums = box.value.split(/\n|,/).map(s=>normPhone(s)).filter(Boolean);
    for(const phone of nums){
      await addRosterNumber(phone);
      const existing = await getUser(phone);
      if(existing && existing.status==='pending'){
        existing.status='approved';
        existing.autoApproved = true;
        await saveUser(existing);
      }
    }
    box.value='';
    const users = await listUsers();
    const roster = await listRoster();
    renderAdminView(users, roster);
    return;
  }

  if(act==='remove-roster'){
    const phone = actEl.dataset.phone;
    await removeRosterNumber(phone);
    const users = await listUsers();
    const roster = await listRoster();
    renderAdminView(users, roster);
    return;
  }

  if(act==='close-admin'){
    if(currentUser) { view='app'; render(); } else { view='landing'; render(); }
    return;
  }

  if(tab){ activeTab=tab; render(); return; }
  if(jump){ activeTab=jump; render(); return; }

  if(act==='add-club'){
    const input = document.getElementById('f-club-input');
    const val = input.value.trim();
    if(!val) return;
    currentUser.favClubs = currentUser.favClubs || [];
    if(currentUser.favClubs.length>=3) return;
    currentUser.favClubs.push(val);
    render();
    return;
  }
  if(rmClub!==undefined){
    currentUser.favClubs.splice(parseInt(rmClub),1);
    render();
    return;
  }

  if(act==='save-profile'){
    currentUser.name = document.getElementById('f-name').value.trim();
    currentUser.favPlayer = document.getElementById('f-player').value.trim();
    currentUser.favNation = document.getElementById('f-nation').value;
    currentUser.speed = parseInt(document.getElementById('f-speed').value);
    currentUser.stamina = parseInt(document.getElementById('f-stamina').value);
    if(root.dataset.pendingAvatar){ currentUser.avatar = root.dataset.pendingAvatar; delete root.dataset.pendingAvatar; }
    await saveUser(currentUser);
    activeTab='card';
    render();
    return;
  }

  if(act==='flip-card'){
    const wrap = t.closest('.flip-wrap');
    if(wrap) wrap.classList.toggle('flipped');
    return;
  }

  if(act==='log-match'){ openMatchModal(); return; }
  if(act==='submit-match'){ await submitMatch(); return; }
  if(act==='close-modal'){ closeModal(); return; }
  if(act==='gen-report'){ genReport(); return; }
}

function renderLoading(){
  root.innerHTML = `<div class="wrap"><p style="text-align:center;color:var(--chalk-dim);margin-top:60px;">Loading…</p></div>`;
}

function renderAdminView(users, roster){
  roster = roster || [];
  const pending = users.filter(u=>u.status==='pending');
  const approved = users.filter(u=>u.status==='approved');
  const rows = (list, showActions)=> list.length ? list.map(u=>`
    <div class="admin-row">
      <div class="info">${escapeHtml(u.name||'Unnamed')} <span class="pill ${u.status}">${u.status}</span>${u.autoApproved?' <span class="pill approved">roster</span>':''}<br><span class="p">${escapeHtml(u.phone)} · via ${u.source}</span></div>
      ${showActions ? `<div><button class="btn btn-primary" style="padding:6px 12px;font-size:12px;" data-act="approve" data-phone="${u.phone}">Approve</button>
      <button class="btn btn-danger" style="padding:6px 12px;font-size:12px;margin-left:6px;" data-act="reject" data-phone="${u.phone}">Reject</button></div>`:''}
    </div>
  `).join('') : `<p style="color:var(--chalk-dim);font-size:13px;">None.</p>`;

  const rosterRows = roster.length ? roster.map(p=>`
    <div class="admin-row"><div class="info"><span class="p">${escapeHtml(p)}</span></div>
    <button class="btn btn-danger" style="padding:6px 12px;font-size:12px;" data-act="remove-roster" data-phone="${p}">Remove</button></div>
  `).join('') : `<p style="color:var(--chalk-dim);font-size:13px;">No numbers on the roster yet.</p>`;

  root.innerHTML = `<div class="wrap">
    <header class="topbar"><div class="logo-row"><span class="logo-ball">⚙</span><span class="logo-text display">Admin Review</span></div>
    <button class="btn btn-outline" data-act="close-admin">Close</button></header>
    <div class="panel">
      <h2>Group roster</h2>
      <div class="sub">Numbers on this list auto-register as approved — no manual review needed. Adding a number here also instantly approves anyone already pending under it.</div>
      <textarea id="roster-input" rows="3" placeholder="Paste phone numbers, one per line" style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--line);background:rgba(0,0,0,0.25);color:var(--chalk);font-family:'Space Mono',monospace;font-size:13px;"></textarea>
      <button class="btn btn-gold" style="margin-top:10px;" data-act="add-roster">Add to roster</button>
      <div style="margin-top:14px;">${rosterRows}</div>
    </div>
    <div class="panel"><h2>Pending approval (${pending.length})</h2>${rows(pending,true)}</div>
    <div class="panel"><h2>Approved players (${approved.length})</h2>${rows(approved,false)}</div>
  </div>`;
}

async function registerOrLogin(phone, name, source){
  let u = await getUser(phone);
  if(!u){
    const autoApproved = await isInRoster(phone);
    u = {
      phone, name: name||'', status: autoApproved ? 'approved' : 'pending', source,
      autoApproved,
      avatar:null, favPlayer:'', favClubs:[], favNation:'',
      speed:50, stamina:50, gamesPlayed:0, matchHistory:[], createdAt: Date.now()
    };
    await saveUser(u);
  }
  currentUser = u;
  routeAfterLogin();
}

function routeAfterLogin(){
  if(currentUser.status==='pending'){ view='pending'; render(); }
  else if(currentUser.status==='rejected'){ view='pending'; render(); }
  else { view='app'; activeTab='card'; render(); }
}

/* ---- Match modal ---- */
function openMatchModal(){
  const backdrop = document.createElement('div');
  backdrop.className='modal-backdrop';
  backdrop.id='modal-backdrop';
  backdrop.innerHTML = `<div class="modal">
    <button class="modal-close" data-act="close-modal">✕</button>
    <h3>Rate today's match</h3>
    <div class="field"><label>Speed this match <span class="range-val" id="m-speed-val">70</span></label>
      <input type="range" min="1" max="99" value="70" id="m-speed"></div>
    <div class="field"><label>Stamina this match <span class="range-val" id="m-stamina-val">70</span></label>
      <input type="range" min="1" max="99" value="70" id="m-stamina"></div>
    <button class="btn btn-primary btn-block" data-act="submit-match">Save match</button>
  </div>`;
  document.body.appendChild(backdrop);
  document.getElementById('m-speed').addEventListener('input', e=>document.getElementById('m-speed-val').textContent=e.target.value);
  document.getElementById('m-stamina').addEventListener('input', e=>document.getElementById('m-stamina-val').textContent=e.target.value);
  backdrop.addEventListener('click', e=>{ if(e.target===backdrop) closeModal(); });
}
function closeModal(){
  const b = document.getElementById('modal-backdrop');
  if(b) b.remove();
}
async function submitMatch(){
  const mSpeed = parseInt(document.getElementById('m-speed').value);
  const mStamina = parseInt(document.getElementById('m-stamina').value);
  currentUser.matchHistory = currentUser.matchHistory || [];
  currentUser.matchHistory.push({date: Date.now(), speed:mSpeed, stamina:mStamina});
  currentUser.gamesPlayed = (currentUser.gamesPlayed||0) + 1;
  currentUser.speed = Math.round(currentUser.speed*0.75 + mSpeed*0.25);
  currentUser.stamina = Math.round(currentUser.stamina*0.75 + mStamina*0.25);
  await saveUser(currentUser);
  closeModal();
  activeTab='card';
  render();
  const card = document.getElementById('my-card-front');
  if(card){ card.classList.add('shine'); setTimeout(()=>card.classList.remove('shine'), 1200); }
}

function genReport(){
  const u = currentUser;
  const history = u.matchHistory||[];
  const overall = computeOverall(u);
  const tier = computeTier(overall);
  const avgSpeed = history.length ? Math.round(history.reduce((a,m)=>a+m.speed,0)/history.length) : u.speed;
  const avgStamina = history.length ? Math.round(history.reduce((a,m)=>a+m.stamina,0)/history.length) : u.stamina;
  const slot = document.getElementById('report-slot');
  slot.innerHTML = `<div class="report-card">
    <h3>Season Report — ${escapeHtml(u.name||'Player')}</h3>
    <div class="report-grid">
      <div><div class="n">${u.gamesPlayed||0}</div><div class="l">Games Played</div></div>
      <div><div class="n">${overall}</div><div class="l">Overall (${tier})</div></div>
      <div><div class="n">${avgSpeed}</div><div class="l">Avg Speed</div></div>
      <div><div class="n">${avgStamina}</div><div class="l">Avg Stamina</div></div>
    </div>
  </div>`;
}

root.addEventListener('click', onClick);
seedBot().then(render);
</script>
