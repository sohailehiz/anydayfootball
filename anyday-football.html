<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anyday Football — Player Cards</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Anton&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --pitch-dark:#08281c;
  --pitch:#0f4230;
  --pitch-mid:#123f2e;
  --line:rgba(245,243,236,0.10);
  --chalk:#f5f3ec;
  --chalk-dim:rgba(245,243,236,0.62);
  --ink:#081712;
  --gold:#c9a227;
  --gold-light:#e8c766;
  --floodlight:#ffdd57;
  --bronze:#a9673b;
  --bronze-light:#c98a5e;
  --silver:#9aa5b1;
  --silver-light:#c3cbd2;
  --legendary:#5b3aa0;
  --legendary-light:#9a6fe0;
  --radius:14px;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:transparent;}
body{
  font-family:'Inter',sans-serif;
  color:var(--chalk);
  min-height:100vh;
}

#app{
  min-height:100vh;
  background:
    radial-gradient(circle at 15% 8%, rgba(255,221,87,0.06), transparent 40%),
    repeating-linear-gradient(90deg, var(--pitch) 0px, var(--pitch) 64px, var(--pitch-mid) 64px, var(--pitch-mid) 128px),
    var(--pitch-dark);
  position:relative;
  overflow-x:hidden;
}

.wrap{max-width:1100px;margin:0 auto;padding:28px 20px 80px;}

.display{font-family:'Anton',sans-serif;letter-spacing:0.5px;text-transform:uppercase;}
.mono{font-family:'Space Mono',monospace;}

h1.brand{
  font-family:'Anton',sans-serif;
  font-size:clamp(28px,5vw,42px);
  letter-spacing:1px;
  margin:0;
  line-height:0.95;
}
h1.brand span{color:var(--floodlight);}
.tagline{color:var(--chalk-dim);font-size:14px;margin-top:8px;max-width:560px;line-height:1.6;}

header.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  margin:0 -20px 22px;
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:10;
  background:var(--pitch-dark);
}
.logo-row{display:flex;align-items:center;gap:10px;}
.logo-ball{font-size:22px;}
.logo-text{font-family:'Anton',sans-serif;font-size:20px;letter-spacing:0.5px;}
a.back-link{color:var(--chalk-dim);font-size:13px;text-decoration:none;border:1px solid var(--line);padding:6px 14px;border-radius:20px;}
a.back-link:hover{border-color:var(--floodlight);color:var(--floodlight);}
.site-nav{display:flex;gap:8px;}
.site-nav a{color:var(--chalk-dim);font-size:13px;text-decoration:none;border:1px solid var(--line);padding:6px 14px;border-radius:20px;}
.site-nav a:hover{border-color:var(--floodlight);color:var(--floodlight);}
.site-nav a.current{color:var(--ink);background:var(--floodlight);border-color:var(--floodlight);}

.login-note{
  background:rgba(255,221,87,0.06);border:1px solid var(--line);border-radius:var(--radius);
  padding:14px 18px;font-size:12.5px;color:var(--chalk-dim);line-height:1.6;margin-bottom:24px;
}
.login-note b{color:var(--chalk);}

.controls-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:20px;}
input#search{
  flex:1;min-width:180px;background:rgba(0,0,0,0.25);border:1px solid var(--line);border-radius:999px;
  padding:9px 16px;color:var(--chalk);font-size:13px;font-family:'Inter',sans-serif;
}
input#search::placeholder{color:var(--chalk-dim);}
.count-tag{font-size:12.5px;color:var(--chalk-dim);white-space:nowrap;}

.rate-section{margin-top:36px;}
.rate-section h2{font-family:'Anton',sans-serif;font-size:18px;letter-spacing:0.5px;margin:0 0 4px;}
.rate-section .sub{font-size:12.5px;color:var(--chalk-dim);margin-bottom:16px;}
.rate-card{
  background:rgba(245,243,236,0.04);border:1px solid var(--line);border-radius:var(--radius);
  padding:16px 18px;margin-bottom:12px;
}
.rate-card .rc-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;flex-wrap:wrap;gap:6px;}
.rate-card .rc-loc{font-weight:700;font-size:14px;}
.rate-card .rc-date{font-size:12px;color:var(--chalk-dim);}
.rate-card .rc-locked{font-size:11.5px;color:var(--chalk-dim);background:rgba(0,0,0,0.2);padding:4px 10px;border-radius:999px;}
.rate-stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:12px;}
.rate-stat label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:0.5px;color:var(--chalk-dim);margin-bottom:4px;}
.rate-stat input{
  width:100%;background:rgba(0,0,0,0.25);border:1px solid var(--line);border-radius:8px;
  padding:8px 10px;color:var(--chalk);font-size:14px;font-family:'Space Mono',monospace;
}
.rate-stat input:focus{outline:none;border-color:var(--floodlight);}
.rate-card button{
  padding:8px 18px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:12.5px;
  background:var(--floodlight);color:var(--ink);
}
.rate-card button:disabled{opacity:0.5;cursor:default;}
.rate-locked-vals{display:flex;gap:14px;flex-wrap:wrap;font-size:12.5px;color:var(--chalk-dim);}
.rate-locked-vals b{color:var(--chalk);}

/* ---------- FIFA card ---------- */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:22px;justify-items:center;}
.flip-wrap{width:230px;height:330px;-webkit-perspective:1200px;perspective:1200px;cursor:pointer;}
.flip-inner{position:relative;width:100%;height:100%;-webkit-transition:-webkit-transform .6s cubic-bezier(.4,.2,.2,1);transition:transform .6s cubic-bezier(.4,.2,.2,1);-webkit-transform-style:preserve-3d;transform-style:preserve-3d;-webkit-transform:rotateY(0deg);transform:rotateY(0deg);}
.flip-wrap.flipped .flip-inner{-webkit-transform:rotateY(180deg);transform:rotateY(180deg);}
/* card-face only handles the 3D transform + hiding; it must NOT also carry border-radius/overflow —
   combining those with backface-visibility on iOS Safari breaks the hiding and the hidden face
   shows through as a mirrored "reflection". Visual clipping/background live on the inner wrapper. */
.card-face{position:absolute;inset:0;-webkit-backface-visibility:hidden;backface-visibility:hidden;box-shadow:0 20px 40px rgba(0,0,0,0.45);-webkit-transform:rotateY(0deg) translateZ(0);transform:rotateY(0deg) translateZ(0);}
.card-face.back{-webkit-transform:rotateY(180deg) translateZ(0);transform:rotateY(180deg) translateZ(0);}

.fifa-card{width:100%;height:100%;border-radius:16px;position:relative;padding:16px 14px;overflow:hidden;}
.fifa-card.tier-bronze{background:linear-gradient(155deg,#c98a5e,#7a4326 60%,#5c3018);}
.fifa-card.tier-silver{background:linear-gradient(155deg,#dbe2e8,#9aa5b1 55%,#5f6771);}
.fifa-card.tier-gold{background:linear-gradient(155deg,var(--gold-light),var(--gold) 55%,#8a6c14);}
.fifa-card.tier-legendary{background:linear-gradient(155deg,#9a6fe0,#5b3aa0 55%,#241246);}
.card-back{width:100%;height:100%;border-radius:16px;position:relative;padding:20px 18px;overflow:hidden;display:flex;flex-direction:column;}
.card-back.tier-bronze{background:linear-gradient(155deg,#f0d3ba,#e0b48f 55%,#c98a5e);}
.card-back.tier-silver{background:linear-gradient(155deg,#ffffff,#eef1f3 55%,#d3d9dd);}
.card-back.tier-gold{background:linear-gradient(155deg,#fff3d1,#fce8b0 55%,var(--gold-light));}
.card-back.tier-legendary{background:linear-gradient(155deg,#d9c6f5,#c4a8f0 55%,#9a6fe0);}
.fifa-card::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(115deg, transparent 20%, rgba(255,255,255,0.35) 32%, transparent 44%);
  transform:translateX(-120%);
  pointer-events:none;
}
.fifa-card.shine::before{animation:sheen 1.1s ease;}
@keyframes sheen{to{transform:translateX(120%);}}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2;}
.card-rating{font-family:'Anton',sans-serif;font-size:36px;line-height:0.85;color:var(--ink);}
.card-stars{font-size:11px;color:var(--ink);margin-top:2px;letter-spacing:1px;}
.card-rank{font-family:'Space Mono',monospace;font-size:12px;color:var(--ink);opacity:0.65;}
.card-avatar-wrap{display:flex;justify-content:center;margin-top:0;position:relative;z-index:2;}
.card-avatar{
  width:92px;height:92px;border-radius:50%;
  background:var(--ink);border:3px solid rgba(255,255,255,0.5);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.card-avatar img{width:100%;height:100%;object-fit:cover;}
.card-name{
  text-align:center;font-family:'Anton',sans-serif;font-size:15.5px;color:var(--ink);
  margin-top:8px;letter-spacing:0.5px;position:relative;z-index:2;
  text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.card-club-line{text-align:center;font-size:10px;color:var(--ink);opacity:0.75;margin-top:2px;position:relative;z-index:2;}
.card-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-top:10px;
  font-family:'Space Mono',monospace;font-size:11px;color:var(--ink);position:relative;z-index:2;
}
.card-stats div{display:flex;justify-content:space-between;}
.card-stats b{font-weight:700;}
.tier-badge{
  position:absolute;bottom:8px;right:12px;font-size:8.5px;letter-spacing:1.5px;
  color:var(--ink);opacity:0.6;font-family:'Anton',sans-serif;z-index:2;
}
.flip-hint{position:absolute;bottom:8px;left:12px;font-size:8.5px;letter-spacing:1px;color:var(--ink);opacity:0.55;z-index:2;font-family:'Inter',sans-serif;}

.back-label{font-family:'Anton',sans-serif;font-size:10px;letter-spacing:2px;color:var(--ink);opacity:0.6;text-transform:uppercase;margin-bottom:12px;}
.back-row{margin-bottom:12px;}
.back-row .bl{font-size:9.5px;text-transform:uppercase;letter-spacing:1px;color:var(--ink);opacity:0.55;font-family:'Inter',sans-serif;}
.back-row .bv{font-family:'Anton',sans-serif;font-size:15px;color:var(--ink);letter-spacing:0.3px;text-transform:uppercase;}
.back-row .bv small{font-family:'Inter',sans-serif;font-size:10.5px;opacity:0.7;text-transform:none;}
.back-row .bv-sub{font-family:'Inter',sans-serif;font-size:10px;color:var(--ink);opacity:0.6;letter-spacing:0.2px;text-transform:none;margin-top:2px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--chalk-dim);}
.empty-state .big{font-size:34px;margin-bottom:10px;}
footer.tag{text-align:center;color:var(--chalk-dim);font-size:11.5px;margin-top:50px;letter-spacing:0.5px;}
</style>
</head>

<script>
/* Folder layout expected alongside this file:
     data/historical.json   — the frozen archive
     data/matches/*.json    — timestamped incremental batches added via anyday-match-archive.html
   Player cards are generated automatically from this data — nobody edits a card directly yet.
   Login (so each player can see and edit their own card, and rate speed/stamina after a match) is
   planned but not built. For now this is a read-only public gallery. */

// Primary data source: Supabase (loaded via seed script from data/historical.json + data/matches/).
// SUPABASE_ANON_KEY is the "publishable" key — safe to expose in client code by design; it can only
// read what the RLS policies in supabase/schema.sql allow (public read-only on match data).
// If Supabase can't be reached, everything below falls back to the static JSON files, unchanged.
const SUPABASE_URL = 'https://nszzhghwhevxcybzprlk.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_jSgeli_BnshhZwxeBkwTEQ_ccDXobfS';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Who's logged in right now (if anyone) and their player_profiles row. Checked once on load —
// see initAuth() near the bottom. Determines whether render() shows the full gallery or just
// this one person's card.
let currentSession = null;
let myProfile = null;

// Ratings only get asked for on matches from this date onward — no retroactively demanding
// self-ratings for every match someone's ever played. Keyed by match_id once fetched, holding
// the row's own id (needed to update it), the four stats, and whether the one-time edit has
// already been used.
const RATING_CUTOFF_DATE = '2026-07-19';
let MY_RATINGS_BY_MATCH = new Map();

async function refreshMyRatings(){
  if(!currentSession){ MY_RATINGS_BY_MATCH = new Map(); return; }
  const { data, error } = await sb
    .from('match_ratings')
    .select('id, match_id, stamina, passing, speed, dribbling, edited')
    .eq('player_id', currentSession.user.id);
  if(error){ console.warn('Could not load your ratings.', error); return; }
  MY_RATINGS_BY_MATCH = new Map((data||[]).map(r=>[r.match_id, r]));
}

async function initAuth(){
  const { data } = await sb.auth.getSession();
  currentSession = data.session;
  if(!currentSession) return;
  const { data: profile } = await sb
    .from('player_profiles')
    .select('name')
    .eq('id', currentSession.user.id)
    .maybeSingle();
  myProfile = profile;
  await refreshMyRatings();
}

async function handleLogout(){
  await sb.auth.signOut();
  location.href = 'login.html';
}

async function fetchJsonSafe(url, fallback){
  try {
    const r = await fetch(url, {cache: 'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    return await r.json();
  } catch(e){
    console.warn('Could not load '+url+' — using fallback.', e);
    return fallback;
  }
}

function detectGithubRepo(){
  if(GITHUB_REPO) return GITHUB_REPO.split('/');
  const host = (typeof location !== 'undefined' && location.hostname) || '';
  const m = host.match(/^([^.]+)\.github\.io$/i);
  if(!m) return null;
  const owner = m[1];
  const parts = location.pathname.split('/').filter(Boolean);
  const repo = parts.length ? parts[0] : `${owner}.github.io`;
  return [owner, repo];
}

async function discoverMatchFileUrls(){
  const info = detectGithubRepo();
  if(!info) return [];
  const [owner, repo] = info;
  try {
    const r = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/matches`, {cache: 'no-store'});
    if(!r.ok) return [];
    const list = await r.json();
    if(!Array.isArray(list)) return [];
    return list.filter(f=>f.type==='file' && f.name.toLowerCase().endsWith('.json')).map(f=>f.download_url);
  } catch(e){
    console.warn('Could not list data/matches/ folder via GitHub API.', e);
    return [];
  }
}

function buildAliasMap(list){
  const map = new Map();
  (list||[]).forEach(a=>{ if(a && a.alias && a.canonical) map.set(a.alias, a.canonical); });
  return map;
}
function normalizeName(n){
  return ALIAS_MAP.get(n) || n;
}

// Reads matches + player_aliases straight from Supabase (via the public REST API, using the
// publishable key) and reshapes them back into this app's usual {date,yr,wd,grp,loc,p:[],d:[]}
// match objects, so every existing function downstream works unmodified regardless of which
// data source is active. Returns null on any failure so loadData() can fall back to the JSON files.
async function fetchFromSupabase(){
  try {
    const headers = { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` };
    const [matchesRes, aliasesRes] = await Promise.all([
      fetch(`${SUPABASE_URL}/rest/v1/matches?select=*,match_players(*),match_dropouts(*)&order=match_date.asc`, { headers, cache: 'no-store' }),
      fetch(`${SUPABASE_URL}/rest/v1/player_aliases?select=*`, { headers, cache: 'no-store' })
    ]);
    if(!matchesRes.ok || !aliasesRes.ok) throw new Error(`Supabase HTTP ${matchesRes.status}/${aliasesRes.status}`);
    const rawMatches = await matchesRes.json();
    const rawAliases = await aliasesRes.json();
    if(!Array.isArray(rawMatches) || !rawMatches.length) throw new Error('Empty Supabase matches response');

    const matches = rawMatches.map(m=>{
      const p = (m.match_players||[]).map(row=>{
        const o = { n: row.raw_name };
        if(row.is_guest) o.g = row.guest_number;
        if(row.guest_name) o.gn = row.guest_name;
        if(row.late_fee) o.l = 1;
        if(row.fee_amount != null) o.f = row.fee_amount;
        return o;
      });
      const d = (m.match_dropouts||[]).map(row=>{
        const o = { n: row.raw_name };
        if(row.fee_amount != null) o.f = row.fee_amount;
        return o;
      });
      // id is only present when the data actually came from Supabase (not the JSON fallback) —
      // it's the real match_id used when saving a rating, so rating only works with live data.
      return { id: m.id, date: m.match_date, yr: m.yr, wd: m.wd, grp: m.grp, loc: m.loc, time: m.match_time, total: m.total, perHead: m.per_head, p, d };
    });
    const aliases = (rawAliases||[]).map(a=>({ alias: a.alias, canonical: a.canonical, note: a.note, merged: a.merged_on }));
    return { matches, aliases };
  } catch(e){
    console.warn('Supabase read failed — falling back to static JSON files.', e);
    return null;
  }
}

// Skill ratings, keyed by canonical player name, populated from every match_ratings row via a
// single request (embeds the related player_profiles row to resolve player_id -> name). Only
// available when data is live from Supabase — ratings can't exist against the static JSON
// fallback, so every player's skill score just uses the DEFAULT_SKILL_SCORE in that mode.
let RATINGS_BY_NAME = new Map();

async function fetchAllRatings(){
  try {
    const headers = { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` };
    const r = await fetch(`${SUPABASE_URL}/rest/v1/match_ratings?select=stamina,passing,speed,dribbling,player_profiles(name)`, { headers, cache: 'no-store' });
    if(!r.ok) throw new Error('HTTP '+r.status);
    const rows = await r.json();
    const map = new Map();
    (rows||[]).forEach(row=>{
      const name = row.player_profiles && row.player_profiles.name;
      if(!name) return;
      const list = map.get(name) || [];
      list.push({ stamina: row.stamina, passing: row.passing, speed: row.speed, dribbling: row.dribbling });
      map.set(name, list);
    });
    return map;
  } catch(e){
    console.warn('Could not load match_ratings — skill scores will use the default.', e);
    return new Map();
  }
}

async function loadData(){
  const fromSupabase = await fetchFromSupabase();
  if(fromSupabase){
    PLAYER_ALIASES = fromSupabase.aliases;
    ALIAS_MAP = buildAliasMap(PLAYER_ALIASES);
    MATCHES = fromSupabase.matches;
    dataSource = 'supabase';
    RATINGS_BY_NAME = await fetchAllRatings();
    render();
    return;
  }

  // Fallback: static JSON files (data/historical.json + data/matches/ discovery), as before.
  const a = await fetchJsonSafe('data/player-aliases.json', null);
  PLAYER_ALIASES = a === null ? EMBEDDED_ALIASES_FALLBACK : a;
  ALIAS_MAP = buildAliasMap(PLAYER_ALIASES);

  const h = await fetchJsonSafe('data/historical.json', null);
  let historical;
  if(h === null){
    historical = EMBEDDED_FALLBACK;
    dataSource = 'offline';
  } else {
    historical = h;
    dataSource = 'live';
  }
  const fileUrls = await discoverMatchFileUrls();
  const chunks = await Promise.all(fileUrls.map(u=>fetchJsonSafe(u, [])));
  MATCHES = historical.concat(chunks.flat()).map(m=>({
    ...m,
    p: m.p.map(p=>({...p, n: normalizeName(p.n)})),
    d: (m.d||[]).map(d=>({...d, n: normalizeName(d.n)}))
  }));
  render();
}

/* ============ Rating math ============
   Overall blends two independent scores: attendance (objective, from real match data) and skill
   (subjective, self-rated after each match — stamina/passing/speed/dribbling, 1-10 each). Skill
   is weighted higher (70/30) since that's the actual point of self-rating, but a player who
   hasn't rated any matches yet gets a flat default skill score of 30 rather than 0, so a brand
   new account isn't crushed to the bottom of the tier list before they've had a chance to rate
   themselves even once. */
const ATTENDANCE_WEIGHT = 0.3;
const SKILL_WEIGHT = 0.7;
const DEFAULT_SKILL_SCORE = 30;

function computeAttendanceScore(gamesPlayed, totalGames){
  if(!totalGames) return 0;
  return Math.max(1, Math.min(99, Math.round((gamesPlayed / totalGames) * 100)));
}
// ratings: array of {stamina,passing,speed,dribbling}, each 1-10 — one entry per rated match.
function computeSkillScore(ratings){
  if(!ratings || !ratings.length) return DEFAULT_SKILL_SCORE;
  const perMatchAvg = ratings.map(r => (r.stamina + r.passing + r.speed + r.dribbling) / 4);
  const overallAvg = perMatchAvg.reduce((a,b)=>a+b, 0) / perMatchAvg.length;
  return Math.max(1, Math.min(99, Math.round((overallAvg / 10) * 99)));
}
function computeOverall(gamesPlayed, totalGames, ratings){
  const attendanceScore = computeAttendanceScore(gamesPlayed, totalGames);
  const skillScore = computeSkillScore(ratings);
  return Math.max(1, Math.min(99, Math.round(attendanceScore * ATTENDANCE_WEIGHT + skillScore * SKILL_WEIGHT)));
}
function computeStars(overall){
  return Math.max(1, Math.min(5, Math.ceil(overall/20)));
}
function computeTier(overall){
  if(overall>=90) return 'legendary';
  if(overall>=75) return 'gold';
  if(overall>=60) return 'silver';
  return 'bronze';
}
function starString(n){
  let s='';
  for(let i=0;i<5;i++) s += i<n ? '★' : '☆';
  return s;
}
function initials(name){
  if(!name) return '?';
  return name.trim().split(/\s+/).slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

}
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}
function escapeHtml(s){
  return (s||'').toString().replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ============ Player stats from real match data ============ */
function allPlayerStats(){
  const map = new Map();
  MATCHES.forEach(m=>{
    const names = [...new Set(m.p.map(p=>p.n))];
    names.forEach(n=>{
      const s = map.get(n) || {name:n, count:0, first:m.date, last:m.date, byYear:new Map()};
      s.count++;
      s.byYear.set(m.yr, (s.byYear.get(m.yr)||0)+1);
      if(m.date < s.first) s.first = m.date;
      if(m.date > s.last) s.last = m.date;
      map.set(n, s);
    });
  });
  return [...map.values()].sort((a,b)=>b.count-a.count);
}
// The public gallery only shows players with 2+ games. "My card" (once logged in) looks a
// specific name up via allPlayerStats() directly, bypassing this filter, so a newer player who
// claimed a login can still see their own card even before they'd otherwise qualify for one.
function playerStats(){
  return allPlayerStats().filter(s=>s.count>1);
}
function yearBreakdown(byYear){
  return [...byYear.entries()].sort((a,b)=>b[0].localeCompare(a[0])).map(([y,c])=>`${y}: ${c}`).join(' &middot; ');
}

/* ============ Card rendering ============ */
// Individual stat display is scaled the same way the overall skill score is (1-10 raw input ->
// 0-99 "FIFA" range), defaulting to DEFAULT_SKILL_SCORE for anyone who hasn't rated a match yet.
function avgStatScaled(ratings, key){
  if(!ratings || !ratings.length) return DEFAULT_SKILL_SCORE;
  const avg = ratings.reduce((a,r)=>a+r[key],0) / ratings.length;
  return Math.max(1, Math.min(99, Math.round((avg/10)*99)));
}

function cardFrontHTML(s, overall, tier, stars, rank, ratings){
  return `
    <div class="card-face">
      <div class="fifa-card tier-${tier}">
        <div class="card-top">
          <div>
            <div class="card-rating mono">${overall}</div>
            <div class="card-stars">${starString(stars)}</div>
          </div>
          <div class="card-rank">#${rank}</div>
        </div>
        <div class="card-avatar-wrap"><div class="card-avatar">${defaultAvatarSVG(s.name)}</div></div>
        <div class="card-name">${escapeHtml(s.name)}</div>
        <div class="card-club-line">Anyday FC</div>
        <div class="card-stats">
          <div><span>SPD</span><b>${avgStatScaled(ratings,'speed')}</b></div>
          <div><span>STA</span><b>${avgStatScaled(ratings,'stamina')}</b></div>
          <div><span>GP</span><b>${s.count}</b></div>
          <div><span>OVR</span><b>${overall}</b></div>
        </div>
        <div class="tier-badge">${tier}</div>
        <div class="flip-hint">↻ tap to flip</div>
      </div>
    </div>
  `;
}
function cardBackHTML(s, overall, tier, ratings, totalGames){
  const attendanceScore = computeAttendanceScore(s.count, totalGames);
  const skillScore = computeSkillScore(ratings);
  return `
    <div class="card-face back">
      <div class="card-back tier-${tier}">
        <div class="back-label">Season stats</div>
        <div class="back-row"><div class="bl">Games played</div><div class="bv">${s.count}</div><div class="bv-sub">${yearBreakdown(s.byYear)}</div></div>
        <div class="back-row"><div class="bl">First game</div><div class="bv" style="font-size:13px;">${fmtDate(s.first)}</div></div>
        <div class="back-row"><div class="bl">Last game</div><div class="bv" style="font-size:13px;">${fmtDate(s.last)}</div></div>
        <div class="back-row"><div class="bl">Attendance</div><div class="bv" style="font-size:13px;">${attendanceScore} <small>(${s.count} / ${totalGames} games)</small></div></div>
        <div class="back-row"><div class="bl">Skill</div><div class="bv" style="font-size:13px;">${skillScore} <small>(${ratings && ratings.length ? `from ${ratings.length} rated match${ratings.length===1?'':'es'}` : 'not rated yet'})</small></div></div>
        <div class="flip-hint">↻ tap to flip back</div>
      </div>
    </div>
  `;
}
function cardHTML(s, rank){
  const ratings = RATINGS_BY_NAME.get(s.name) || [];
  const totalGames = MATCHES.length;
  const overall = computeOverall(s.count, totalGames, ratings);
  const tier = computeTier(overall);
  const stars = computeStars(overall);
  return `
    <div class="flip-wrap" data-flip>
      <div class="flip-inner">
        ${cardFrontHTML(s, overall, tier, stars, rank, ratings)}
        ${cardBackHTML(s, overall, tier, ratings, totalGames)}
      </div>
    </div>
  `;
}

function navHTML(current){
  const loginLink = currentSession
    ? `<a href="anyday-football.html">My Card</a><a href="anyday-football.html?all=1" class="${current==='all'?'current':''}">Players</a><a href="#" id="logout-link">Log out</a>`
    : `<a href="anyday-football.html?all=1" class="${current==='all'?'current':''}">Players</a><a href="login.html">Login</a>`;
  return `
    <a href="index.html">Home</a>
    ${loginLink}
    <a href="anyday-match-archive.html">Match Archive</a>
  `;
}

function renderMyCard(){
  const s = allPlayerStats().find(p=>p.name===myProfile.name);
  const app = document.getElementById('app');

  if(!s){
    // Shouldn't normally happen — you can only log in as a name that's in the match archive —
    // but handle it gracefully rather than showing a blank page.
    app.innerHTML = `
      <div class="wrap">
        <header class="topbar">
          <div class="logo-row"><span class="logo-ball">⚽</span><span class="logo-text display">Player Cards</span></div>
          <nav class="site-nav">${navHTML('me')}</nav>
        </header>
        <div class="empty-state"><div class="big">🏟️</div>Couldn't find match data for ${escapeHtml(myProfile.name)} yet.</div>
      </div>
    `;
    wireNav();
    return;
  }

  // Matches you played in, from the rating cutoff date onward — no retroactively asking anyone
  // to rate every match they've ever played. Newest first. Only possible against live Supabase
  // data, since ratings need a real match_id (the JSON fallback has none).
  const toRate = MATCHES
    .filter(m => m.id && m.date >= RATING_CUTOFF_DATE && m.p.some(p=>p.n===s.name))
    .sort((a,b)=> b.date.localeCompare(a.date));

  app.innerHTML = `
    <div class="wrap">
      <header class="topbar">
        <div class="logo-row"><span class="logo-ball">⚽</span><span class="logo-text display">Player Cards</span></div>
        <nav class="site-nav">${navHTML('me')}</nav>
      </header>
      <h1 class="brand">Welcome back,<br><span>${escapeHtml(s.name)}</span>.</h1>
      <p class="tagline">This is your card. <a href="anyday-football.html?all=1" style="color:var(--floodlight);">View all players &rarr;</a></p>

      <div class="login-note">
        <b>Rating formula:</b> overall = 30% attendance (games played &divide; total games) + 70% skill (your self-rated stamina/passing/speed/dribbling, averaged across every match you've rated). Unrated matches count as a flat 30 skill score until you rate at least one.
      </div>

      <div class="card-grid" style="justify-content:flex-start;">
        ${cardHTML(s, allPlayerStats().findIndex(p=>p.name===s.name)+1)}
      </div>

      <div class="rate-section">
        <h2>Rate your games</h2>
        <div class="sub">${toRate.length ? `${toRate.length} match${toRate.length===1?'':'es'} since ${fmtDate(RATING_CUTOFF_DATE)} — each stat is 1-10. You can correct a rating once after saving, then it locks.` : `No matches to rate yet since ${fmtDate(RATING_CUTOFF_DATE)}.`}</div>
        ${toRate.map(m => renderRateCard(m, s.name)).join('')}
      </div>
    </div>
  `;
  document.querySelectorAll('[data-flip]').forEach(el=>{
    el.addEventListener('click', ()=>el.classList.toggle('flipped'));
  });
  document.querySelectorAll('[data-save-btn]').forEach(btn=>{
    btn.addEventListener('click', ()=>handleSaveRating(btn.dataset.matchId));
  });
  wireNav();
}

function renderRateCard(m, playerName){
  const existing = MY_RATINGS_BY_MATCH.get(m.id);
  const label = `${m.loc || 'Match'} &middot; ${fmtDate(m.date)}`;

  if(existing && existing.edited){
    return `
      <div class="rate-card" data-rating-match="${m.id}">
        <div class="rc-top">
          <div><div class="rc-loc">${escapeHtml(m.loc || 'Match')}</div><div class="rc-date">${fmtDate(m.date)}</div></div>
          <div class="rc-locked">Rated &middot; locked</div>
        </div>
        <div class="rate-locked-vals">
          <div>STA <b>${existing.stamina}</b></div>
          <div>PAS <b>${existing.passing}</b></div>
          <div>SPD <b>${existing.speed}</b></div>
          <div>DRI <b>${existing.dribbling}</b></div>
        </div>
      </div>
    `;
  }

  const isEdit = !!existing;
  const v = key => isEdit ? existing[key] : '';
  return `
    <div class="rate-card" data-rating-match="${m.id}">
      <div class="rc-top">
        <div><div class="rc-loc">${escapeHtml(m.loc || 'Match')}</div><div class="rc-date">${fmtDate(m.date)}</div></div>
        ${isEdit ? `<div class="rc-locked">One correction allowed</div>` : ''}
      </div>
      <div class="rate-stats-grid">
        <div class="rate-stat"><label>Stamina</label><input type="number" min="1" max="10" data-stat="stamina" value="${v('stamina')}"></div>
        <div class="rate-stat"><label>Passing</label><input type="number" min="1" max="10" data-stat="passing" value="${v('passing')}"></div>
        <div class="rate-stat"><label>Speed</label><input type="number" min="1" max="10" data-stat="speed" value="${v('speed')}"></div>
        <div class="rate-stat"><label>Dribbling</label><input type="number" min="1" max="10" data-stat="dribbling" value="${v('dribbling')}"></div>
      </div>
      <button data-save-btn data-match-id="${m.id}">${isEdit ? 'Save correction' : 'Save rating'}</button>
    </div>
  `;
}

async function handleSaveRating(matchId){
  const root = document.querySelector(`[data-rating-match="${matchId}"]`);
  const getVal = key => parseInt(root.querySelector(`[data-stat="${key}"]`).value, 10);
  const stamina = getVal('stamina'), passing = getVal('passing'), speed = getVal('speed'), dribbling = getVal('dribbling');

  for(const [label, val] of [['Stamina',stamina],['Passing',passing],['Speed',speed],['Dribbling',dribbling]]){
    if(!Number.isInteger(val) || val<1 || val>10){
      alert(`${label} must be a whole number from 1 to 10.`);
      return;
    }
  }

  const btn = root.querySelector('[data-save-btn]');
  btn.disabled = true; btn.textContent = 'Saving...';

  const existing = MY_RATINGS_BY_MATCH.get(matchId);
  let error;
  if(existing){
    ({ error } = await sb.from('match_ratings')
      .update({ stamina, passing, speed, dribbling, edited: true, updated_at: new Date().toISOString() })
      .eq('id', existing.id));
  } else {
    ({ error } = await sb.from('match_ratings')
      .insert({ match_id: matchId, player_id: currentSession.user.id, stamina, passing, speed, dribbling }));
  }

  if(error){
    alert(`Couldn't save your rating: ${error.message}`);
    btn.disabled = false; btn.textContent = existing ? 'Save correction' : 'Save rating';
    return;
  }

  await refreshMyRatings();
  RATINGS_BY_NAME = await fetchAllRatings();
  render();
}

function wireNav(){
  const logoutLink = document.getElementById('logout-link');
  if(logoutLink) logoutLink.addEventListener('click', (e)=>{ e.preventDefault(); handleLogout(); });
}

function render(){
  // Logged-in players land on their own card by default. Adding ?all=1 to the URL (or clicking
  // "Players" in the nav) always shows the full gallery instead, even while logged in.
  const showAll = new URLSearchParams(location.search).get('all') === '1';
  if(currentSession && myProfile && !showAll){
    renderMyCard();
    return;
  }

  const stats = playerStats();
  const q = searchTerm.trim().toLowerCase();
  const filtered = q ? stats.filter(s=>s.name.toLowerCase().includes(q)) : stats;

  document.getElementById('app').innerHTML = `
    <div class="wrap">
      <header class="topbar">
        <div class="logo-row"><span class="logo-ball">⚽</span><span class="logo-text display">Player Cards</span></div>
        <nav class="site-nav">${navHTML('all')}</nav>
      </header>
      <h1 class="brand">Every regular.<br><span>One card each.</span></h1>
      <p class="tagline">FIFA-style cards, generated automatically from the match archive. Anyone who's played more than once gets a card.</p>

      <div class="login-note">
        <b>Editing coming soon.</b> You can now <a href="login.html" style="color:var(--floodlight);">log in</a> if you're a regular player, but self-rating speed/stamina and editing your own card isn't built yet. Ratings are calculated purely from attendance (games played ÷ 52 weeks), with speed and stamina held at a flat 50 until self-ratings exist.
      </div>

      <div class="controls-row">
        <input id="search" type="text" placeholder="Search a player…" value="${escapeHtml(searchTerm)}">
        <span class="count-tag">${filtered.length} of ${stats.length} players (2+ games)</span>
      </div>

      <div class="card-grid">
        ${filtered.length ? filtered.map((s,i)=>cardHTML(s, i+1)).join('') : `<div class="empty-state" style="grid-column:1/-1;"><div class="big">🏟️</div>No players match that search.</div>`}
      </div>

      <footer class="tag">${dataSource==='offline' ? 'Offline snapshot — open via the hosted GitHub Pages URL for live data.' : `${stats.length} players with 2+ games · generated from the match archive`}</footer>
    </div>
  `;

  document.querySelectorAll('[data-flip]').forEach(el=>{
    el.addEventListener('click', ()=>el.classList.toggle('flipped'));
  });
  const searchEl = document.getElementById('search');
  if(searchEl) searchEl.addEventListener('input', e=>{
    // Re-rendering via innerHTML destroys and recreates the <input>, which drops focus and
    // closes the mobile keyboard after every keystroke. Re-focus the new node synchronously
    // (same tick) and restore the cursor position so typing feels continuous on mobile.
    const cursorPos = e.target.selectionStart;
    searchTerm = e.target.value;
    render();
    const newSearchEl = document.getElementById('search');
    if(newSearchEl){
      newSearchEl.focus();
      newSearchEl.setSelectionRange(cursorPos, cursorPos);
    }
  });
  wireNav();
}

async function init(){
  await initAuth();
  await loadData();
}
init();
</script>
